<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -15 60 30">
  <defs>
    <linearGradient id="fbody" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3d2020"/>
      <stop offset="100%" stop-color="#2a1515"/>
    </linearGradient>
  </defs>

  <!-- Left lug at (-30, 0) -->
  <rect x="-30" y="-5" width="10" height="10" rx="2" fill="#1a2535"/>
  <rect x="-30" y="-3" width="8"  height="6"  rx="1.5" fill="#253545"/>
  <circle cx="-26" cy="0" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Right lug at (30, 0) -->
  <rect x="20" y="-5" width="10" height="10" rx="2" fill="#1a2535"/>
  <rect x="22" y="-3" width="8"  height="6"  rx="1.5" fill="#253545"/>
  <circle cx="26" cy="0" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Fuse body -->
  <rect x="-18" y="-12" width="36" height="24" rx="6" fill="url(#fbody)"/>
  <rect x="-16" y="-10" width="32" height="20" rx="5" fill="#1a0a0a" opacity="0.8"/>
  <!-- Fuse element wire -->
  <line x1="-12" y1="0" x2="12" y2="0" stroke="#d97706" stroke-width="1.2" opacity="0.7"/>
  <!-- End caps -->
  <rect x="-18" y="-12" width="6" height="24" rx="3" fill="#4a3030"/>
  <rect x="12"  y="-12" width="6" height="24" rx="3" fill="#4a3030"/>
  <!-- Sheen on body -->
  <rect x="-14" y="-10" width="6" height="4" rx="2" fill="#ffffff" opacity="0.06"/>

  <!-- Rating label area — grey bar placeholder -->
  <rect x="-8" y="-5" width="16" height="10" rx="1" fill="#200c0c" opacity="0.8"/>
  <rect x="-6" y="-3" width="12" height="4" rx="1" fill="#3a4050"/>
</svg>
