<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360" role="img" aria-label="Three pole AC DIN breaker">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfa"/>
      <stop offset="0.52" stop-color="#ececeb"/>
      <stop offset="1" stop-color="#d8d9d7"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f8f7"/>
      <stop offset="1" stop-color="#e3e4e2"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9cbc9"/>
      <stop offset="0.2" stop-color="#ffffff"/>
      <stop offset="0.8" stop-color="#e6e7e5"/>
      <stop offset="1" stop-color="#babdba"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3d3b"/>
      <stop offset="0.45" stop-color="#171818"/>
      <stop offset="1" stop-color="#070808"/>
    </linearGradient>
    <radialGradient id="screw" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#8c8c87"/>
      <stop offset="0.45" stop-color="#565650"/>
      <stop offset="1" stop-color="#1d1e1d"/>
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <g id="screw-head">
      <circle r="17" fill="#2f302e" opacity="0.22"/>
      <circle r="14.5" fill="url(#screw)" stroke="#222321" stroke-width="1.5"/>
      <path d="M -8.5 -2 H 8.5 M -2 -8.5 V 8.5" stroke="#d9dad6" stroke-width="3" stroke-linecap="round"/>
      <path d="M -9.5 2 H 9.5 M 2 -9.5 V 9.5" stroke="#1b1c1a" stroke-width="1.2" stroke-linecap="round" opacity="0.72"/>
    </g>
    <g id="pole">
      <rect x="0" y="25" width="82" height="310" rx="5" fill="url(#body)" stroke="#c5c8c5" stroke-width="1.6"/>
      <rect x="3" y="28" width="76" height="304" rx="3" fill="url(#edge)" opacity="0.48"/>
      <path d="M 0 91 H 82 M 0 249 H 82" stroke="#cfd2cf" stroke-width="1.3"/>
      <rect x="3" y="25" width="76" height="67" rx="4" fill="url(#face)" stroke="#c7cac7" stroke-width="1"/>
      <rect x="3" y="249" width="76" height="86" rx="4" fill="url(#face)" stroke="#c7cac7" stroke-width="1"/>
      <path d="M 17 25 h48 l5 5 h-58 z" fill="#ffffff" opacity="0.62"/>
      <path d="M 20 313 h42 l-6 15 h-30 z" fill="#cbcecb" stroke="#bcc0bc" stroke-width="1"/>
      <path d="M 41 25 V 335" stroke="#bbbeba" stroke-width="0.9" opacity="0.7"/>
      <g transform="translate(41 58)"><use href="#screw-head"/></g>
      <g transform="translate(41 296)"><use href="#screw-head"/></g>
      <rect x="4" y="92" width="74" height="157" rx="4" fill="url(#face)" stroke="#ced1ce" stroke-width="1"/>
      <path d="M 8 166 h66" stroke="#f9faf8" stroke-width="2"/>
    </g>
  </defs>

  <rect width="360" height="360" fill="none"/>
  <g filter="url(#softShadow)">
    <g transform="translate(57 0)"><use href="#pole"/></g>
    <g transform="translate(139 0)"><use href="#pole"/></g>
    <g transform="translate(221 0)"><use href="#pole"/></g>
    <path d="M 139 25 V 335 M 221 25 V 335" stroke="#9fa39f" stroke-width="1.6"/>

    <g transform="translate(98 211)">
      <rect x="-28" y="-47" width="56" height="56" rx="3" fill="#f5f6f4" stroke="#c3c6c3" stroke-width="1.1"/>
      <rect x="-20" y="-40" width="40" height="46" rx="5" fill="#101111"/>
      <path d="M -20 -37 C -8 -43 8 -43 20 -37 V -12 C 8 -17 -8 -17 -20 -12 Z" fill="url(#handle)"/>
    </g>
    <g transform="translate(180 211)">
      <rect x="-28" y="-47" width="56" height="56" rx="3" fill="#f5f6f4" stroke="#c3c6c3" stroke-width="1.1"/>
      <rect x="-20" y="-40" width="40" height="46" rx="5" fill="#101111"/>
      <path d="M -20 -37 C -8 -43 8 -43 20 -37 V -12 C 8 -17 -8 -17 -20 -12 Z" fill="url(#handle)"/>
    </g>
    <g transform="translate(262 211)">
      <rect x="-28" y="-47" width="56" height="56" rx="3" fill="#f5f6f4" stroke="#c3c6c3" stroke-width="1.1"/>
      <rect x="-20" y="-40" width="40" height="46" rx="5" fill="#101111"/>
      <path d="M -20 -37 C -8 -43 8 -43 20 -37 V -12 C 8 -17 -8 -17 -20 -12 Z" fill="url(#handle)"/>
    </g>
    <rect x="68" y="203" width="224" height="18" rx="3" fill="url(#handle)" stroke="#090a0a" stroke-width="1.2"/>
    <path d="M 82 208 H 278 M 82 213 H 278" stroke="#4a4b48" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
