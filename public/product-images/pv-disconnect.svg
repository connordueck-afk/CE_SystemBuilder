<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -32 80 64">
  <!--
    Terminal positions:
    In+  (-40, -10)   Out+ (40, -10)
    In-  (-40,  10)   Out- (40,  10)
  -->
  <defs>
    <linearGradient id="discbg" x1="0" y1="-32" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#16101e"/>
      <stop offset="100%" stop-color="#100c16"/>
    </linearGradient>
    <linearGradient id="dischousing" x1="0" y1="-26" x2="0" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e1830"/>
      <stop offset="100%" stop-color="#150f22"/>
    </linearGradient>
    <linearGradient id="knob" x1="0" y1="-1" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#d03020"/>
      <stop offset="50%"  stop-color="#f04030"/>
      <stop offset="100%" stop-color="#901810"/>
    </linearGradient>
  </defs>

  <!-- Background enclosure -->
  <rect x="-38" y="-30" width="76" height="60" rx="5" fill="url(#discbg)"/>
  <rect x="-34" y="-29" width="68" height="3" rx="1.5" fill="#2a1e38" opacity="0.5"/>

  <!-- Central switch housing -->
  <rect x="-16" y="-28" width="32" height="56" rx="4" fill="url(#dischousing)"/>
  <rect x="-14" y="-26" width="28" height="4" rx="2" fill="#2e2442" opacity="0.7"/>

  <!-- PV+ conductor path (amber) at y=-10 -->
  <line x1="-40" y1="-10" x2="-18" y2="-10"
        stroke="#b8780e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18"  y1="-10" x2="40"  y2="-10"
        stroke="#b8780e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- PV- conductor path (dimmer amber) at y=10 -->
  <line x1="-40" y1="10" x2="-18" y2="10"
        stroke="#7a5010" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18"  y1="10" x2="40"  y2="10"
        stroke="#7a5010" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Switch contacts (left side) -->
  <rect x="-17" y="-13" width="5" height="6" rx="1.5" fill="#2a2040" stroke="#3a3050" stroke-width="0.5"/>
  <rect x="-17" y="7"   width="5" height="6" rx="1.5" fill="#2a2040" stroke="#3a3050" stroke-width="0.5"/>

  <!-- Switch contacts (right side) -->
  <rect x="12" y="-13" width="5" height="6" rx="1.5" fill="#2a2040" stroke="#3a3050" stroke-width="0.5"/>
  <rect x="12" y="7"   width="5" height="6" rx="1.5" fill="#2a2040" stroke="#3a3050" stroke-width="0.5"/>

  <!-- Closed switch blades -->
  <line x1="-12" y1="-10" x2="12" y2="-10"
        stroke="#c98518" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="-12" y1="10"  x2="12" y2="10"
        stroke="#7a5010" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Rotary actuator — red safety color -->
  <circle cx="0" cy="0" r="10" fill="#1c1530" stroke="#c02020" stroke-width="2"/>
  <circle cx="0" cy="0" r="8"  fill="#1a1228" stroke="#2e2040" stroke-width="0.5"/>
  <!-- Position indicator bar -->
  <rect x="-1.5" y="-6.5" width="3" height="7" rx="1" fill="url(#knob)"/>
  <!-- ON status dot (green) -->
  <circle cx="0" cy="-8.5" r="1.8" fill="#20c050" opacity="0.85"/>
  <!-- Outer ring glow -->
  <circle cx="0" cy="0" r="10" fill="none" stroke="#d03020" stroke-width="0.5" opacity="0.4"/>

  <!-- Terminal port circles -->
  <circle cx="-40" cy="-10" r="3.5" fill="#111116" stroke="#3a3a50" stroke-width="0.8"/>
  <circle cx="-40" cy="-10" r="1.4" fill="#0a0a10"/>
  <circle cx="-40" cy="10"  r="3.5" fill="#111116" stroke="#3a3a50" stroke-width="0.8"/>
  <circle cx="-40" cy="10"  r="1.4" fill="#0a0a10"/>
  <circle cx="40"  cy="-10" r="3.5" fill="#111116" stroke="#3a3a50" stroke-width="0.8"/>
  <circle cx="40"  cy="-10" r="1.4" fill="#0a0a10"/>
  <circle cx="40"  cy="10"  r="3.5" fill="#111116" stroke="#3a3a50" stroke-width="0.8"/>
  <circle cx="40"  cy="10"  r="1.4" fill="#0a0a10"/>

  <!-- Grey bar placeholder (replaces "PV DISC" label) -->
  <rect x="-14" y="21" width="28" height="5" rx="1.5" fill="#3a4050"/>
</svg>
