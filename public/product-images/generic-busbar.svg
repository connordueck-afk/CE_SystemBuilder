<svg xmlns="http://www.w3.org/2000/svg" viewBox="-70 -40 140 80" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="copper" x1="0" y1="-40" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6b4c1e"/>
      <stop offset="40%"  stop-color="#c8862a"/>
      <stop offset="60%"  stop-color="#d4962e"/>
      <stop offset="100%" stop-color="#5a3e18"/>
    </linearGradient>
    <linearGradient id="busbarbody" x1="0" y1="-40" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2a3848"/>
      <stop offset="100%" stop-color="#1a2535"/>
    </linearGradient>
  </defs>

  <!-- Mounting bracket / enclosure -->
  <rect x="-68" y="-22" width="136" height="58" rx="5" fill="url(#busbarbody)"/>

  <!-- Copper busbar rail -->
  <rect x="-66" y="-10" width="132" height="16" rx="3" fill="url(#copper)"/>
  <rect x="-64" y="-9"  width="128" height="4" rx="2" fill="#e8ac50" opacity="0.35"/>
  <rect x="-64" y="3"   width="128" height="3" rx="1" fill="#4a3010" opacity="0.4"/>

  <!-- Grey bar placeholder on rail (replaces text label) -->
  <rect x="-24" y="-5" width="48" height="5" rx="1.5" fill="#3a4050" opacity="0.5"/>

  <!-- Connection studs (4 terminal positions) -->
  <rect x="-56" y="8"  width="14" height="16" rx="2" fill="#1a2535"/>
  <rect x="-54" y="10" width="10" height="12" rx="1.5" fill="#253545"/>
  <circle cx="-49" cy="16" r="4" fill="#0d1824" stroke="#3a5070" stroke-width="1"/>
  <circle cx="-49" cy="16" r="1.5" fill="#253545"/>

  <rect x="-21" y="8"  width="14" height="16" rx="2" fill="#1a2535"/>
  <rect x="-19" y="10" width="10" height="12" rx="1.5" fill="#253545"/>
  <circle cx="-14" cy="16" r="4" fill="#0d1824" stroke="#3a5070" stroke-width="1"/>
  <circle cx="-14" cy="16" r="1.5" fill="#253545"/>

  <rect x="7" y="8"  width="14" height="16" rx="2" fill="#1a2535"/>
  <rect x="9" y="10" width="10" height="12" rx="1.5" fill="#253545"/>
  <circle cx="14" cy="16" r="4" fill="#0d1824" stroke="#3a5070" stroke-width="1"/>
  <circle cx="14" cy="16" r="1.5" fill="#253545"/>

  <rect x="42" y="8"  width="14" height="16" rx="2" fill="#1a2535"/>
  <rect x="44" y="10" width="10" height="12" rx="1.5" fill="#253545"/>
  <circle cx="49" cy="16" r="4" fill="#0d1824" stroke="#3a5070" stroke-width="1"/>
  <circle cx="49" cy="16" r="1.5" fill="#253545"/>

  <!-- Mounting holes -->
  <circle cx="-62" cy="-16" r="2.5" fill="#111b28"/>
  <circle cx="-62" cy="-16" r="1"   fill="#0a1220"/>
  <circle cx="62"  cy="-16" r="2.5" fill="#111b28"/>
  <circle cx="62"  cy="-16" r="1"   fill="#0a1220"/>

  <!-- Bottom edge -->
  <rect x="-66" y="28" width="132" height="4" rx="2" fill="#111b28"/>
</svg>
