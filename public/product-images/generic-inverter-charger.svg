<svg xmlns="http://www.w3.org/2000/svg" viewBox="-70 -50 140 100">
  <defs>
    <linearGradient id="invbody" x1="0" y1="-50" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2c3e52"/>
      <stop offset="100%" stop-color="#1a2535"/>
    </linearGradient>
    <linearGradient id="invface" x1="0" y1="-38" x2="0" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#edf0f5"/>
      <stop offset="100%" stop-color="#d5dce8"/>
    </linearGradient>
  </defs>

  <!-- Main enclosure body -->
  <rect x="-68" y="-48" width="136" height="96" rx="7" fill="url(#invbody)"/>
  <rect x="-62" y="-47" width="124" height="3" rx="1.5" fill="#3d5270" opacity="0.5"/>

  <!-- Left terminal block — DC side -->
  <rect x="-70" y="-36" width="18" height="72" rx="4" fill="#101820"/>
  <!-- DC+ port at (-70, -20) -->
  <rect x="-72" y="-24" width="10" height="8" rx="1.5" fill="#1e2d40"/>
  <circle cx="-67" cy="-20" r="3.5" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>
  <!-- DC- port at (-70, 20) -->
  <rect x="-72" y="16" width="10" height="8" rx="1.5" fill="#1e2d40"/>
  <circle cx="-67" cy="20" r="3.5" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Right terminal block — AC side -->
  <rect x="52" y="-36" width="18" height="72" rx="4" fill="#101820"/>
  <!-- AC port divider line -->
  <line x1="54" y1="1" x2="68" y2="1" stroke="#2a3a4e" stroke-width="0.8"/>
  <!-- AC In L at (70, -30) -->
  <rect x="62" y="-34" width="10" height="7" rx="1.5" fill="#1e2d40"/>
  <circle cx="67" cy="-30" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>
  <!-- AC In N at (70, -10) -->
  <rect x="62" y="-14" width="10" height="7" rx="1.5" fill="#1e2d40"/>
  <circle cx="67" cy="-10" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>
  <!-- AC Out L at (70, 10) -->
  <rect x="62" y="7" width="10" height="7" rx="1.5" fill="#1e2d40"/>
  <circle cx="67" cy="10" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>
  <!-- AC Out N at (70, 30) -->
  <rect x="62" y="27" width="10" height="7" rx="1.5" fill="#1e2d40"/>
  <circle cx="67" cy="30" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Face plate -->
  <rect x="-50" y="-44" width="100" height="88" rx="5" fill="url(#invface)"/>

  <!-- Ventilation slots left -->
  <rect x="-48" y="-30" width="5" height="60" rx="2" fill="#c5cdd8"/>
  <line x1="-46" y1="-28" x2="-46" y2="28" stroke="#aab5c4" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Ventilation slots right -->
  <rect x="43" y="-30" width="5" height="60" rx="2" fill="#c5cdd8"/>
  <line x1="45" y1="-28" x2="45" y2="28" stroke="#aab5c4" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Main display area -->
  <rect x="-38" y="-38" width="76" height="76" rx="4" fill="#0d1824"/>
  <rect x="-37" y="-37" width="74" height="74" rx="3" fill="#101f30"/>

  <!-- Grey bar title placeholder -->
  <rect x="-26" y="-31" width="52" height="7" rx="2" fill="#3a4050"/>

  <!-- Sine wave symbol -->
  <path d="M -24 -4 Q -18 -14 -12 -4 Q -6 6 0 -4 Q 6 -14 12 -4 Q 18 6 24 -4"
        fill="none" stroke="#7c61c7" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Bidirectional arrows (DC ↔ AC) — no text labels -->
  <line x1="-9" y1="10" x2="9" y2="10" stroke="#4a5568" stroke-width="1.2"/>
  <polygon points="9,10 5,7 5,13" fill="#4a5568"/>
  <polygon points="-9,10 -5,7 -5,13" fill="#4a5568"/>

  <!-- LED row -->
  <circle cx="-12" cy="26" r="2.5" fill="#22c55e"/>
  <circle cx="-4"  cy="26" r="2.5" fill="#3b82f6"/>
  <circle cx="4"   cy="26" r="2.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="12"  cy="26" r="2.5" fill="#374151"/>

  <!-- Bottom label strip — grey bar placeholder -->
  <rect x="-30" y="32" width="60" height="8" rx="1.5" fill="#0a1520"/>
  <rect x="-22" y="34.5" width="44" height="4" rx="1" fill="#3a4050"/>

  <!-- Corner mounting holes -->
  <circle cx="-60" cy="-42" r="2.5" fill="#0d1824"/>
  <circle cx="-60" cy="-42" r="1"   fill="#070f1a"/>
  <circle cx="60"  cy="-42" r="2.5" fill="#0d1824"/>
  <circle cx="60"  cy="-42" r="1"   fill="#070f1a"/>
  <circle cx="-60" cy="42"  r="2.5" fill="#0d1824"/>
  <circle cx="-60" cy="42"  r="1"   fill="#070f1a"/>
  <circle cx="60"  cy="42"  r="2.5" fill="#0d1824"/>
  <circle cx="60"  cy="42"  r="1"   fill="#070f1a"/>
</svg>
