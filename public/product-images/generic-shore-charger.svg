<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -40 120 80">
  <defs>
    <linearGradient id="chgbody" x1="0" y1="-40" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#131c28"/>
    </linearGradient>
    <linearGradient id="chgface" x1="0" y1="-32" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#edf0f6"/>
      <stop offset="100%" stop-color="#d5dce8"/>
    </linearGradient>
  </defs>

  <!-- Main enclosure -->
  <rect x="-58" y="-38" width="116" height="76" rx="6" fill="url(#chgbody)"/>
  <rect x="-52" y="-37" width="104" height="3" rx="1.5" fill="#2a3a50" opacity="0.5"/>

  <!-- Left side — AC input block -->
  <rect x="-60" y="-28" width="15" height="56" rx="3" fill="#111820"/>
  <!-- AC L port at (-60, -15) -->
  <rect x="-61" y="-19" width="9" height="8" rx="1.5" fill="#1e2830"/>
  <circle cx="-57" cy="-15" r="3.2" fill="#0d1420" stroke="#2a3a50" stroke-width="0.8"/>
  <!-- AC N port at (-60, 15) -->
  <rect x="-61" y="11" width="9" height="8" rx="1.5" fill="#1e2830"/>
  <circle cx="-57" cy="15" r="3.2" fill="#0d1420" stroke="#2a3a50" stroke-width="0.8"/>

  <!-- Right side — DC output block -->
  <rect x="45" y="-28" width="15" height="56" rx="3" fill="#111820"/>
  <!-- DC+ port at (60, -15) -->
  <rect x="52" y="-19" width="9" height="8" rx="1.5" fill="#1e2830"/>
  <circle cx="57" cy="-15" r="3.2" fill="#0d1420" stroke="#2a3a50" stroke-width="0.8"/>
  <!-- DC- port at (60, 15) -->
  <rect x="52" y="11" width="9" height="8" rx="1.5" fill="#1e2830"/>
  <circle cx="57" cy="15" r="3.2" fill="#0d1420" stroke="#2a3a50" stroke-width="0.8"/>

  <!-- Face plate -->
  <rect x="-43" y="-34" width="86" height="68" rx="4" fill="url(#chgface)"/>

  <!-- Display -->
  <rect x="-28" y="-28" width="56" height="36" rx="3" fill="#0b1520"/>
  <rect x="-27" y="-27" width="54" height="34" rx="2" fill="#0d1a28"/>

  <!-- Grey bar title placeholder -->
  <rect x="-20" y="-22" width="40" height="6" rx="1.5" fill="#3a4050"/>

  <!-- Conversion arrow (no text) -->
  <line x1="-7" y1="-4" x2="6" y2="-4" stroke="#3a5060" stroke-width="1"/>
  <polygon points="6,-4 2,-7 2,-1" fill="#3a5060"/>

  <!-- Charge progress bar -->
  <rect x="-20" y="3" width="40" height="3" rx="1.5" fill="#1a2e20"/>
  <rect x="-20" y="3" width="30" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>

  <!-- LEDs -->
  <circle cx="-10" cy="16" r="2.5" fill="#22c55e"/>
  <circle cx="-3"  cy="16" r="2.5" fill="#3b82f6"/>
  <circle cx="4"   cy="16" r="2.5" fill="#f59e0b" opacity="0.5"/>

  <!-- Bottom label strip — grey bar placeholder -->
  <rect x="-28" y="22" width="56" height="8" rx="1.5" fill="#c8d4e0"/>
  <rect x="-20" y="24" width="40" height="4" rx="1" fill="#3a4050"/>

  <!-- Corner mounting holes -->
  <circle cx="-52" cy="-34" r="2" fill="#0d1824"/>
  <circle cx="-52" cy="-34" r="1" fill="#07101a"/>
  <circle cx="52"  cy="-34" r="2" fill="#0d1824"/>
  <circle cx="52"  cy="-34" r="1" fill="#07101a"/>
  <circle cx="-52" cy="34"  r="2" fill="#0d1824"/>
  <circle cx="-52" cy="34"  r="1" fill="#07101a"/>
  <circle cx="52"  cy="34"  r="2" fill="#0d1824"/>
  <circle cx="52"  cy="34"  r="1" fill="#07101a"/>
</svg>
