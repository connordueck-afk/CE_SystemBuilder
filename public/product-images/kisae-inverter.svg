<svg xmlns="http://www.w3.org/2000/svg" viewBox="-70 -45 140 90">
  <!--
    Kisae SW / SWXFR True Sine Wave Inverter — no text.
    Product: width=140, height=90
    Terminals: DC+ (-70,-18), DC- (-70,18), AC Out L (70,-12), AC Out N (70,12)
  -->
  <defs>
    <linearGradient id="kinv-shell" x1="0" y1="-45" x2="0" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#222630"/>
      <stop offset="100%" stop-color="#13151c"/>
    </linearGradient>
    <linearGradient id="kinv-face" x1="0" y1="-38" x2="0" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ededf2"/>
      <stop offset="100%" stop-color="#d2d5de"/>
    </linearGradient>
    <linearGradient id="kinv-orange" x1="-50" y1="0" x2="50" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#b85208"/>
      <stop offset="50%"  stop-color="#e07820"/>
      <stop offset="100%" stop-color="#b85208"/>
    </linearGradient>
  </defs>

  <!-- Outer shell -->
  <rect x="-68" y="-43" width="136" height="86" rx="6" fill="url(#kinv-shell)"/>

  <!-- Cooling fins on top -->
  <g fill="#0d0f16" opacity="0.6">
    <rect x="-50" y="-43" width="3" height="6"/>
    <rect x="-42" y="-43" width="3" height="6"/>
    <rect x="-34" y="-43" width="3" height="6"/>
    <rect x="31" y="-43" width="3" height="6"/>
    <rect x="39" y="-43" width="3" height="6"/>
    <rect x="47" y="-43" width="3" height="6"/>
  </g>

  <!-- Left terminal block (DC input — heavy lugs) -->
  <rect x="-70" y="-30" width="16" height="60" rx="3" fill="#0a0c12"/>
  <circle cx="-62" cy="-18" r="5" fill="#7a1818" stroke="#1a1c24" stroke-width="1"/>
  <circle cx="-62" cy="-18" r="2.6" fill="#0a0c12"/>
  <circle cx="-62" cy="18" r="5" fill="#1a1a1a" stroke="#3a3c44" stroke-width="1"/>
  <circle cx="-62" cy="18" r="2.6" fill="#0a0c12"/>

  <!-- Right terminal block (AC output) -->
  <rect x="54" y="-26" width="16" height="52" rx="3" fill="#0a0c12"/>
  <rect x="56" y="-18" width="11" height="11" rx="1.5" fill="#181a22"/>
  <circle cx="62" cy="-12" r="3.4" fill="#060708" stroke="#20222a" stroke-width="0.8"/>
  <rect x="56" y="6"  width="11" height="11" rx="1.5" fill="#181a22"/>
  <circle cx="62" cy="12" r="3.4" fill="#060708" stroke="#20222a" stroke-width="0.8"/>

  <!-- Face plate -->
  <rect x="-50" y="-38" width="100" height="76" rx="4" fill="url(#kinv-face)"/>

  <!-- Orange Kisae accent stripe -->
  <rect x="-50" y="-20" width="100" height="9" rx="2" fill="url(#kinv-orange)"/>
  <rect x="-49" y="-20" width="98" height="3" rx="1.5" fill="#f0a040" opacity="0.3"/>

  <!-- AC outlet socket (illustrative) -->
  <rect x="14" y="2" width="28" height="26" rx="3" fill="#c2c8d2" stroke="#9aa0aa" stroke-width="1"/>
  <circle cx="23" cy="11" r="1.8" fill="#2a2c34"/>
  <circle cx="33" cy="11" r="1.8" fill="#2a2c34"/>
  <rect x="26" y="18" width="4" height="5" rx="1" fill="#2a2c34"/>

  <!-- Power button + LEDs -->
  <circle cx="-34" cy="12" r="6"  fill="#1a1c24" stroke="#3a3c44" stroke-width="1.2"/>
  <circle cx="-34" cy="12" r="2.5" fill="#22c55e"/>
  <circle cx="-18" cy="6"  r="2.5" fill="#22c55e"/>
  <circle cx="-18" cy="16" r="2.5" fill="#f59e0b" opacity="0.5"/>

  <!-- Bottom label bar -->
  <rect x="-34" y="26" width="44" height="8" rx="1.5" fill="#bcc4ce"/>
  <rect x="-28" y="28.5" width="32" height="3.5" rx="1" fill="#2a3040"/>
</svg>
