<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -15 60 30">
  <defs>
    <linearGradient id="brkbody" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e2d3e"/>
      <stop offset="100%" stop-color="#131d2a"/>
    </linearGradient>
  </defs>

  <!-- Left terminal lug at (-30, 0) -->
  <rect x="-30" y="-5" width="10" height="10" rx="2" fill="#1a2535"/>
  <rect x="-30" y="-3" width="8"  height="6"  rx="1.5" fill="#253545"/>
  <circle cx="-26" cy="0" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Right terminal lug at (30, 0) -->
  <rect x="20" y="-5" width="10" height="10" rx="2" fill="#1a2535"/>
  <rect x="22" y="-3" width="8"  height="6"  rx="1.5" fill="#253545"/>
  <circle cx="26" cy="0" r="3" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Breaker body -->
  <rect x="-18" y="-13" width="36" height="26" rx="4" fill="url(#brkbody)"/>
  <!-- Face panel -->
  <rect x="-16" y="-11" width="32" height="22" rx="3" fill="#283848"/>

  <!-- Trip lever / handle (red) -->
  <rect x="-5" y="-13" width="10" height="8" rx="2" fill="#dc2626"/>
  <rect x="-4" y="-12" width="8"  height="6" rx="1.5" fill="#ef4444"/>
  <circle cx="0" cy="-9" r="1.5" fill="#fee2e2"/>

  <!-- Grey bar placeholders (no text) -->
  <rect x="-9" y="-4" width="18" height="4" rx="1.5" fill="#3a4050"/>
  <rect x="-10" y="4" width="20" height="4" rx="1" fill="#3a4050" opacity="0.7"/>
</svg>
