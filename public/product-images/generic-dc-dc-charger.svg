<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -30 80 60">
  <defs>
    <linearGradient id="dcdcbody" x1="0" y1="-30" x2="0" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3028"/>
      <stop offset="100%" stop-color="#111e18"/>
    </linearGradient>
    <linearGradient id="dcdcface" x1="0" y1="-22" x2="0" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8f0ec"/>
      <stop offset="100%" stop-color="#d0dcd4"/>
    </linearGradient>
  </defs>

  <!-- Main enclosure -->
  <rect x="-38" y="-28" width="76" height="56" rx="5" fill="url(#dcdcbody)"/>
  <rect x="-32" y="-27" width="64" height="3" rx="1.5" fill="#2a4030" opacity="0.5"/>

  <!-- Left terminal block — DC input -->
  <rect x="-40" y="-18" width="12" height="36" rx="3" fill="#0d1812"/>
  <!-- In+ port at (-40, -10) -->
  <rect x="-41" y="-14" width="8" height="7" rx="1.5" fill="#1a2820"/>
  <circle cx="-37" cy="-10" r="2.8" fill="#0a1410" stroke="#2a4030" stroke-width="0.8"/>
  <!-- In- port at (-40, 10) -->
  <rect x="-41" y="7" width="8" height="7" rx="1.5" fill="#1a2820"/>
  <circle cx="-37" cy="10" r="2.8" fill="#0a1410" stroke="#2a4030" stroke-width="0.8"/>

  <!-- Right terminal block — DC output -->
  <rect x="28" y="-18" width="12" height="36" rx="3" fill="#0d1812"/>
  <!-- Out+ port at (40, -10) -->
  <rect x="33" y="-14" width="8" height="7" rx="1.5" fill="#1a2820"/>
  <circle cx="37" cy="-10" r="2.8" fill="#0a1410" stroke="#2a4030" stroke-width="0.8"/>
  <!-- Out- port at (40, 10) -->
  <rect x="33" y="7" width="8" height="7" rx="1.5" fill="#1a2820"/>
  <circle cx="37" cy="10" r="2.8" fill="#0a1410" stroke="#2a4030" stroke-width="0.8"/>

  <!-- Face plate -->
  <rect x="-26" y="-24" width="52" height="48" rx="4" fill="url(#dcdcface)"/>

  <!-- Display area -->
  <rect x="-18" y="-20" width="36" height="26" rx="2" fill="#0a1810"/>

  <!-- Grey bar title placeholder -->
  <rect x="-12" y="-17" width="24" height="5" rx="1.5" fill="#3a4050"/>

  <!-- Conversion arrow (no text) -->
  <line x1="-4" y1="-3" x2="4" y2="-3" stroke="#2d5040" stroke-width="1"/>
  <polygon points="4,-3 0,-6 0,0" fill="#2d5040"/>

  <!-- LED indicator -->
  <circle cx="0" cy="14" r="2.5" fill="#22c55e"/>

  <!-- Bottom label strip — grey bar placeholder -->
  <rect x="-16" y="18" width="32" height="8" rx="1.5" fill="#c4d8c8"/>
  <rect x="-12" y="20" width="24" height="4" rx="1" fill="#3a4050"/>
</svg>
