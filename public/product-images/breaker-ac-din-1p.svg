<svg xmlns="http://www.w3.org/2000/svg" width="160" height="360" viewBox="0 0 160 360" role="img" aria-label="Single pole AC DIN breaker">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfa"/>
      <stop offset="0.52" stop-color="#ececeb"/>
      <stop offset="1" stop-color="#d8d9d7"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f8f7"/>
      <stop offset="1" stop-color="#e3e4e2"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9cbc9"/>
      <stop offset="0.2" stop-color="#ffffff"/>
      <stop offset="0.8" stop-color="#e6e7e5"/>
      <stop offset="1" stop-color="#babdba"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3d3b"/>
      <stop offset="0.45" stop-color="#171818"/>
      <stop offset="1" stop-color="#070808"/>
    </linearGradient>
    <radialGradient id="screw" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#8c8c87"/>
      <stop offset="0.45" stop-color="#565650"/>
      <stop offset="1" stop-color="#1d1e1d"/>
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <g id="screw-head">
      <circle r="18" fill="#2f302e" opacity="0.22"/>
      <circle r="15" fill="url(#screw)" stroke="#222321" stroke-width="1.5"/>
      <path d="M -9 -2 H 9 M -2 -9 V 9" stroke="#d9dad6" stroke-width="3" stroke-linecap="round"/>
      <path d="M -10 2 H 10 M 2 -10 V 10" stroke="#1b1c1a" stroke-width="1.2" stroke-linecap="round" opacity="0.72"/>
    </g>
  </defs>

  <rect width="160" height="360" fill="none"/>
  <g filter="url(#softShadow)">
    <rect x="49" y="18" width="62" height="324" rx="5" fill="url(#body)" stroke="#c5c8c5" stroke-width="1.6"/>
    <rect x="52" y="21" width="56" height="318" rx="3" fill="url(#edge)" opacity="0.55"/>
    <path d="M 49 85 H 111 M 49 247 H 111" stroke="#cfd2cf" stroke-width="1.3"/>
    <path d="M 80 18 V 342" stroke="#bbbeba" stroke-width="0.9" opacity="0.7"/>

    <rect x="52" y="18" width="56" height="68" rx="4" fill="url(#face)" stroke="#c7cac7" stroke-width="1"/>
    <rect x="52" y="247" width="56" height="95" rx="4" fill="url(#face)" stroke="#c7cac7" stroke-width="1"/>
    <path d="M 65 18 h30 l4 5 h-38 z" fill="#ffffff" opacity="0.62"/>
    <path d="M 64 319 h32 l-5 15 h-22 z" fill="#cbcecb" stroke="#bcc0bc" stroke-width="1"/>

    <g transform="translate(80 55)">
      <use href="#screw-head"/>
    </g>
    <g transform="translate(80 306)">
      <use href="#screw-head"/>
    </g>

    <rect x="53" y="86" width="54" height="162" rx="4" fill="url(#face)" stroke="#ced1ce" stroke-width="1"/>
    <path d="M 56 164 h48" stroke="#f9faf8" stroke-width="2"/>
    <path d="M 56 245 h48" stroke="#c8cbc8" stroke-width="1.2"/>

    <g transform="translate(80 215)">
      <rect x="-27" y="-50" width="54" height="58" rx="3" fill="#f5f6f4" stroke="#c3c6c3" stroke-width="1.1"/>
      <rect x="-19" y="-42" width="38" height="47" rx="5" fill="#101111"/>
      <path d="M -19 -39 C -8 -45 8 -45 19 -39 V -11 C 7 -16 -7 -16 -19 -11 Z" fill="url(#handle)"/>
      <rect x="-25" y="-8" width="50" height="16" rx="2" fill="url(#handle)" stroke="#090a0a" stroke-width="1"/>
      <path d="M -16 -4 H 16 M -15 0 H 15 M -14 4 H 14" stroke="#4a4b48" stroke-width="1.1" stroke-linecap="round"/>
    </g>
  </g>
</svg>
