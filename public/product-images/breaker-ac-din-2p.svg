<svg xmlns="http://www.w3.org/2000/svg" width="260" height="360" viewBox="0 0 260 360" role="img" aria-label="Dual pole AC DIN breaker">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfa"/>
      <stop offset="0.52" stop-color="#ececeb"/>
      <stop offset="1" stop-color="#d8d9d7"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f8f7"/>
      <stop offset="1" stop-color="#e3e4e2"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9cbc9"/>
      <stop offset="0.2" stop-color="#ffffff"/>
      <stop offset="0.8" stop-color="#e6e7e5"/>
      <stop offset="1" stop-color="#babdba"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3d3b"/>
      <stop offset="0.45" stop-color="#171818"/>
      <stop offset="1" stop-color="#070808"/>
    </linearGradient>
    <radialGradient id="screw" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#8c8c87"/>
      <stop offset="0.45" stop-color="#565650"/>
      <stop offset="1" stop-color="#1d1e1d"/>
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <g id="screw-head">
      <circle r="18" fill="#2f302e" opacity="0.22"/>
      <circle r="15" fill="url(#screw)" stroke="#222321" stroke-width="1.5"/>
      <path d="M -9 -2 H 9 M -2 -9 V 9" stroke="#d9dad6" stroke-width="3" stroke-linecap="round"/>
      <path d="M -10 2 H 10 M 2 -10 V 10" stroke="#1b1c1a" stroke-width="1.2" stroke-linecap="round" opacity="0.72"/>
    </g>
    <g id="pole">
      <rect x="0" y="18" width="78" height="324" rx="5" fill="url(#body)" stroke="#c5c8c5" stroke-width="1.6"/>
      <rect x="3" y="21" width="72" height="318" rx="3" fill="url(#edge)" opacity="0.48"/>
      <path d="M 0 85 H 78 M 0 247 H 78" stroke="#cfd2cf" stroke-width="1.3"/>
      <rect x="3" y="18" width="72" height="68" rx="4" fill="url(#face)" stroke="#c7cac7" stroke-width="1"/>
      <rect x="3" y="247" width="72" height="95" rx="4" fill="url(#face)" stroke="#c7cac7" stroke-width="1"/>
      <path d="M 18 18 h42 l5 5 h-52 z" fill="#ffffff" opacity="0.62"/>
      <path d="M 22 319 h34 l-5 15 h-24 z" fill="#cbcecb" stroke="#bcc0bc" stroke-width="1"/>
      <path d="M 39 18 V 342" stroke="#bbbeba" stroke-width="0.9" opacity="0.7"/>
      <g transform="translate(39 55)"><use href="#screw-head"/></g>
      <g transform="translate(39 306)"><use href="#screw-head"/></g>
      <rect x="4" y="86" width="70" height="162" rx="4" fill="url(#face)" stroke="#ced1ce" stroke-width="1"/>
      <path d="M 8 164 h62" stroke="#f9faf8" stroke-width="2"/>
    </g>
  </defs>

  <rect width="260" height="360" fill="none"/>
  <g filter="url(#softShadow)">
    <g transform="translate(52 0)"><use href="#pole"/></g>
    <g transform="translate(130 0)"><use href="#pole"/></g>
    <path d="M 130 18 V 342" stroke="#9fa39f" stroke-width="1.6"/>

    <g transform="translate(91 213)">
      <rect x="-28" y="-48" width="56" height="57" rx="3" fill="#f5f6f4" stroke="#c3c6c3" stroke-width="1.1"/>
      <rect x="-20" y="-41" width="40" height="47" rx="5" fill="#101111"/>
      <path d="M -20 -38 C -8 -44 8 -44 20 -38 V -12 C 8 -17 -8 -17 -20 -12 Z" fill="url(#handle)"/>
    </g>
    <g transform="translate(169 213)">
      <rect x="-28" y="-48" width="56" height="57" rx="3" fill="#f5f6f4" stroke="#c3c6c3" stroke-width="1.1"/>
      <rect x="-20" y="-41" width="40" height="47" rx="5" fill="#101111"/>
      <path d="M -20 -38 C -8 -44 8 -44 20 -38 V -12 C 8 -17 -8 -17 -20 -12 Z" fill="url(#handle)"/>
    </g>
    <rect x="61" y="205" width="138" height="18" rx="3" fill="url(#handle)" stroke="#090a0a" stroke-width="1.2"/>
    <path d="M 72 210 H 188 M 72 215 H 188" stroke="#4a4b48" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
