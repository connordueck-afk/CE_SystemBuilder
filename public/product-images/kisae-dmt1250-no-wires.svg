<svg xmlns="http://www.w3.org/2000/svg" width="828" height="1096" viewBox="36 44 828 1096" role="img" aria-label="Kisae DMT1250 simplified product asset">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e332f"/>
      <stop offset="55%" stop-color="#1d211e"/>
      <stop offset="100%" stop-color="#0f1210"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#303632"/>
      <stop offset="100%" stop-color="#151815"/>
    </linearGradient>
    <linearGradient id="rib" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#151815"/>
      <stop offset="50%" stop-color="#2b302c"/>
      <stop offset="100%" stop-color="#101310"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7a01f"/>
      <stop offset="100%" stop-color="#e37b00"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#769695"/>
      <stop offset="100%" stop-color="#4c6868"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33a447"/>
      <stop offset="100%" stop-color="#0f6b2d"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f4f4"/>
      <stop offset="55%" stop-color="#bfc5ca"/>
      <stop offset="100%" stop-color="#80868d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g id="product" filter="url(#shadow)">
    <!-- side mounting flanges -->
    <path d="M72 146 h104 v210 h-38 q-22 0-22 22 q0 22 22 22 h38 v378 h-42 q-22 0-22 22 q0 22 22 22 h42 v124 h-104 q-20 0-20-20 v-760 q0-20 20-20z" fill="#1d211e"/>
    <path d="M724 146 h104 q20 0 20 20 v760 q0 20-20 20 h-104 v-124 h42 q22 0 22-22 q0-22-22-22 h-42 v-378 h38 q22 0 22-22 q0-22-22-22 h-38z" fill="#1d211e"/>

    <!-- main housing -->
    <rect x="166" y="72" width="568" height="1040" rx="42" fill="url(#body)" stroke="#111411" stroke-width="6"/>
    <path d="M176 96 q274-28 548 0 v92 h-548z" fill="url(#cap)"/>
    <path d="M176 1006 h548 v74 q0 34-34 34 h-480 q-34 0-34-34z" fill="url(#cap)"/>
    <rect x="178" y="186" width="544" height="2" fill="#3b403c" opacity="0.75"/>
    <rect x="178" y="998" width="544" height="2" fill="#3b403c" opacity="0.75"/>

    <!-- top label placeholder, no readable text -->
    <rect x="248" y="118" width="180" height="10" rx="5" fill="#f0a12a"/>
    <rect x="442" y="118" width="172" height="10" rx="5" fill="#f0a12a"/>
    <rect x="628" y="118" width="70" height="10" rx="5" fill="#e9ecef"/>

    <!-- front panel and ribbed columns -->
    <rect x="238" y="196" width="424" height="792" rx="4" fill="#2a2e2a" stroke="#0f1210" stroke-width="4"/>
    <g opacity="0.95">
      <rect x="210" y="196" width="14" height="792" rx="5" fill="url(#rib)"/>
      <rect x="230" y="196" width="8" height="792" rx="4" fill="url(#rib)"/>
      <rect x="666" y="196" width="8" height="792" rx="4" fill="url(#rib)"/>
      <rect x="684" y="196" width="14" height="792" rx="5" fill="url(#rib)"/>
      <rect x="704" y="196" width="8" height="792" rx="4" fill="url(#rib)"/>
    </g>

    <!-- orange display fascia -->
    <rect x="318" y="256" width="264" height="260" rx="2" fill="url(#orange)"/>
    <rect x="356" y="300" width="190" height="92" rx="1" fill="url(#screen)" stroke="#b8c7c5" stroke-width="3"/>
    <path d="M360 302 h184 l-184 90z" fill="#ffffff" opacity="0.08"/>
    <rect x="342" y="420" width="216" height="58" rx="6" fill="#f6b52a" opacity="0.72"/>

    <!-- button 1: question mark symbol drawn as vector paths -->
    <circle cx="378" cy="450" r="20" fill="url(#green)" stroke="#055b26" stroke-width="3"/>
    <path d="M371 441 q7-11 17-5 q8 5 3 14 q-3 5-8 7 q-4 2-4 7" fill="none" stroke="#e9f7e9" stroke-width="4" stroke-linecap="round"/>
    <circle cx="379" cy="470" r="2.4" fill="#e9f7e9"/>

    <!-- button 2: play symbol -->
    <circle cx="450" cy="450" r="20" fill="url(#green)" stroke="#055b26" stroke-width="3"/>
    <polygon points="444,438 444,462 462,450" fill="#e9f7e9"/>

    <!-- button 3: check symbol -->
    <circle cx="522" cy="450" r="20" fill="url(#green)" stroke="#055b26" stroke-width="3"/>
    <path d="M511 449 l8 8 l17-18" fill="none" stroke="#e9f7e9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- right side terminal / stud detail -->
    <rect x="724" y="770" width="74" height="86" rx="8" fill="#222622"/>
    <circle cx="770" cy="805" r="24" fill="url(#metal)" stroke="#777d82" stroke-width="4"/>
    <circle cx="770" cy="805" r="13" fill="#d6d9dc" stroke="#7d848b" stroke-width="3"/>
    <rect x="760" y="848" width="24" height="4" rx="2" fill="#686f75"/>

    <!-- lower screws -->
    <circle cx="260" cy="1050" r="12" fill="#151815" stroke="#3b403c" stroke-width="3"/>
    <path d="M254 1050 h12 m-6-6 v12" stroke="#070807" stroke-width="2"/>
    <circle cx="638" cy="1050" r="12" fill="#151815" stroke="#3b403c" stroke-width="3"/>
    <path d="M632 1050 h12 m-6-6 v12" stroke="#070807" stroke-width="2"/>

  </g>
</svg>
