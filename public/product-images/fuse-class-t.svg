<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -15 60 30">
  <defs>
    <linearGradient id="ferrule" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c0c0c0"/>
      <stop offset="30%"  stop-color="#e8e8e8"/>
      <stop offset="70%"  stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="-12" x2="0" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="50%"  stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>

  <!-- Left ferrule at (-30, 0) -->
  <line x1="-30" y1="0" x2="-18" y2="0" stroke="#8a8a8a" stroke-width="2.5"/>
  <rect x="-22" y="-10" width="12" height="20" rx="3" fill="url(#ferrule)"/>
  <line x1="-21" y1="-7" x2="-21" y2="7" stroke="#a0a0a0" stroke-width="0.5"/>
  <line x1="-18" y1="-7" x2="-18" y2="7" stroke="#a0a0a0" stroke-width="0.5"/>
  <line x1="-15" y1="-7" x2="-15" y2="7" stroke="#a0a0a0" stroke-width="0.5"/>
  <rect x="-22" y="-10" width="3"  height="20" rx="2" fill="#606060" opacity="0.3"/>
  <circle cx="-30" cy="0" r="3.2" fill="#1a1a1a" stroke="#6a6a6a" stroke-width="0.8"/>
  <circle cx="-30" cy="0" r="1.2" fill="#404040"/>

  <!-- Right ferrule at (30, 0) -->
  <line x1="18" y1="0" x2="30" y2="0" stroke="#8a8a8a" stroke-width="2.5"/>
  <rect x="10" y="-10" width="12" height="20" rx="3" fill="url(#ferrule)"/>
  <line x1="11" y1="-7" x2="11" y2="7" stroke="#a0a0a0" stroke-width="0.5"/>
  <line x1="14" y1="-7" x2="14" y2="7" stroke="#a0a0a0" stroke-width="0.5"/>
  <line x1="17" y1="-7" x2="17" y2="7" stroke="#a0a0a0" stroke-width="0.5"/>
  <rect x="19" y="-10" width="3"  height="20" rx="2" fill="#606060" opacity="0.3"/>
  <circle cx="30" cy="0" r="3.2" fill="#1a1a1a" stroke="#6a6a6a" stroke-width="0.8"/>
  <circle cx="30" cy="0" r="1.2" fill="#404040"/>

  <!-- Central barrel body -->
  <rect x="-10" y="-12" width="20" height="24" rx="5" fill="url(#barrel)"/>
  <rect x="-8"  y="-12" width="16" height="3" rx="1.5" fill="#303030"/>
  <rect x="-8"  y="9"   width="16" height="3" rx="1.5" fill="#303030"/>
  <!-- Type color band (orange for Class T) -->
  <rect x="-4"  y="-12" width="8" height="24" rx="4" fill="#c46820" opacity="0.75"/>

  <!-- Top sheen -->
  <rect x="-7"  y="-11" width="5" height="4" rx="1.5" fill="#ffffff" opacity="0.07"/>

  <!-- Grey bar placeholders (replaces CLASS / T text) -->
  <rect x="-4" y="-7" width="8" height="3" rx="1" fill="#3a4050" opacity="0.7"/>
  <rect x="-3" y="-1" width="6" height="3" rx="1" fill="#3a4050" opacity="0.7"/>
</svg>
