<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1100" viewBox="69 193 969 731" role="img" aria-label="Discover LYNK II simplified product asset">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#565a60"/>
      <stop offset="100%" stop-color="#272b30"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06080a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58b947"/>
      <stop offset="100%" stop-color="#3f9e38"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#d7dbe0"/>
      <stop offset="50%" stop-color="#aeb5bd"/>
      <stop offset="75%" stop-color="#edf0f3"/>
      <stop offset="100%" stop-color="#89919a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- mounting tabs around square body -->
    <path d="M360 122 h480 q18 0 30 12 l24 24 v72 h-56 l-8 -18 h-460 l-8 18 h-56 v-72 l24-24 q12-12 30-12z" fill="url(#frame)" stroke="#2c3137" stroke-width="4"/>
    <path d="M360 906 h480 q18 0 30 12 l24 24 v72 h-56 l-8 -18 h-460 l-8 18 h-56 v-72 l24-24 q12-12 30-12z" fill="url(#frame)" stroke="#2c3137" stroke-width="4"/>
    <rect x="188" y="352" width="72" height="420" rx="20" fill="url(#frame)" stroke="#2c3137" stroke-width="4"/>
    <rect x="940" y="352" width="72" height="420" rx="20" fill="url(#frame)" stroke="#2c3137" stroke-width="4"/>

    <!-- slots on top/bottom tabs -->
    <g fill="#f0f1f2">
      <rect x="536" y="154" width="128" height="26" rx="13"/>
      <circle cx="430" cy="154" r="24" fill="#1a1e23"/>
      <circle cx="770" cy="154" r="24" fill="#1a1e23"/>
      <rect x="536" y="938" width="128" height="26" rx="13"/>
      <circle cx="430" cy="964" r="24" fill="#1a1e23"/>
      <circle cx="770" cy="964" r="24" fill="#1a1e23"/>
    </g>

    <!-- side connector -->
    <rect x="132" y="526" width="54" height="76" rx="8" fill="#1b2025"/>
    <rect x="98" y="534" width="86" height="60" rx="6" fill="url(#metal)" stroke="#848c95" stroke-width="4"/>
    <path d="M102 538 h72 l10 8 v36 l-10 8 h-72" fill="none" stroke="#eef1f4" stroke-opacity="0.5" stroke-width="4"/>
    <g stroke="#aab1b8" stroke-width="3">
      <path d="M112 538 v52"/><path d="M124 536 v56"/><path d="M136 536 v56"/><path d="M148 536 v56"/><path d="M160 538 v52"/>
    </g>

    <!-- main body -->
    <rect x="200" y="186" width="760" height="760" rx="34" fill="url(#frame)" stroke="#6a6e74" stroke-width="4"/>
    <rect x="218" y="204" width="724" height="724" rx="22" fill="url(#plate)"/>

    <!-- logo placeholder -->
    <g fill="#f4f5f6" opacity="0.98">
      <rect x="274" y="300" width="260" height="28" rx="12"/>
      <rect x="274" y="344" width="190" height="18" rx="8" opacity="0.85"/>
      <rect x="274" y="252" width="18" height="90" rx="6" fill="#58b947"/>
      <rect x="298" y="260" width="18" height="18" rx="4" fill="#58b947"/>
      <rect x="298" y="288" width="18" height="18" rx="4" fill="#58b947"/>
      <rect x="298" y="316" width="18" height="18" rx="4" fill="#58b947"/>
    </g>

    <!-- left vertical label placeholders -->
    <g fill="#f2f3f4" opacity="0.92">
      <rect x="246" y="426" width="12" height="88" rx="6"/>
      <rect x="246" y="568" width="12" height="88" rx="6"/>
      <rect x="246" y="714" width="12" height="82" rx="6"/>
      <rect x="246" y="844" width="12" height="88" rx="6"/>
      <rect x="858" y="432" width="12" height="104" rx="6"/>
      <rect x="858" y="740" width="12" height="92" rx="6"/>
      <rect x="918" y="774" width="12" height="58" rx="6"/>
    </g>

    <!-- led column and pointer -->
    <g>
      <circle cx="576" cy="430" r="12" fill="#7ad34b"/>
      <circle cx="576" cy="466" r="12" fill="#7ad34b"/>
      <circle cx="576" cy="502" r="12" fill="#7ad34b"/>
      <circle cx="576" cy="538" r="12" fill="#7ad34b"/>
      <circle cx="576" cy="574" r="12" fill="#7ad34b"/>
      <circle cx="576" cy="610" r="12" fill="#7ad34b"/>
      <circle cx="576" cy="646" r="12" fill="#7ad34b"/>
      <circle cx="604" cy="592" r="6" fill="#ff2b82"/>
      <path d="M620 420 h34 l-22 128 h-24 z" fill="#f3f4f5"/>
      <rect x="630" y="404" width="30" height="12" rx="6" fill="#f0f2f3" opacity="0.85"/>
    </g>

    <!-- mid label bars -->
    <g fill="#f1f3f4" opacity="0.9">
      <rect x="612" y="620" width="96" height="18" rx="8"/>
      <rect x="612" y="660" width="132" height="18" rx="8"/>
      <rect x="612" y="700" width="104" height="18" rx="8"/>
    </g>

    <!-- product title placeholder -->
    <rect x="536" y="816" width="296" height="56" rx="14" fill="#5b6066" opacity="0.95"/>

    <!-- bottom green band and site block -->
    <rect x="222" y="884" width="520" height="4" rx="2" fill="url(#green)"/>
    <rect x="742" y="852" width="200" height="36" rx="2" fill="url(#green)"/>
    <rect x="780" y="862" width="124" height="16" rx="8" fill="#ecf3e8" opacity="0.86"/>
  </g>
</svg>