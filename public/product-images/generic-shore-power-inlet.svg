<svg xmlns="http://www.w3.org/2000/svg" viewBox="-45 -32 90 64">
  <defs>
    <linearGradient id="shorebg" x1="0" y1="-32" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#131820"/>
      <stop offset="100%" stop-color="#0d1016"/>
    </linearGradient>
    <linearGradient id="shorebody" x1="-45" y1="0" x2="-10" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>
  </defs>

  <!-- Outer enclosure -->
  <rect x="-43" y="-30" width="86" height="60" rx="5" fill="url(#shorebg)"/>
  <rect x="-39" y="-29" width="78" height="4"  rx="2" fill="#1e2840" opacity="0.4"/>

  <!-- Source body (left side) -->
  <rect x="-40" y="-26" width="60" height="52" rx="4" fill="url(#shorebody)"/>
  <rect x="-38" y="-25" width="56" height="4"  rx="2" fill="#242e44" opacity="0.6"/>

  <!-- Sine wave — AC source symbol -->
  <path d="M -24,0 C -21,-12 -17,-12 -14,0 C -11,12 -7,12 -4,0 C -1,-12 3,-12 6,0"
        fill="none" stroke="#3a7ad0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Shore power inlet face on left -->
  <circle cx="-36" cy="0" r="10" fill="#101420" stroke="#1e2c40" stroke-width="1.2"/>
  <!-- Three-pin layout on inlet face -->
  <circle cx="-36" cy="-5" r="2.2" fill="#0a0c14" stroke="#2a3a50" stroke-width="0.7"/>
  <circle cx="-40" cy="4"  r="2.2" fill="#0a0c14" stroke="#2a3a50" stroke-width="0.7"/>
  <circle cx="-32" cy="4"  r="2.2" fill="#0a0c14" stroke="#2a3a50" stroke-width="0.7"/>
  <circle cx="-36" cy="0" r="11.5" fill="none" stroke="#1c2840" stroke-width="1" opacity="0.7"/>

  <!-- Grey bar placeholder for product label -->
  <rect x="-18" y="-22" width="36" height="6" rx="1.5" fill="#3a4050"/>

  <!-- Output conductor stubs -->
  <line x1="20"  y1="-10" x2="45" y2="-10" stroke="#3a7ad0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20"  y1="10"  x2="45" y2="10"  stroke="#787878" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Output port dividers -->
  <rect x="18" y="-16" width="4" height="12" rx="1.5" fill="#1c2a3c"/>
  <rect x="18" y="4"   width="4" height="12" rx="1.5" fill="#1c2a3c"/>

  <!-- Terminal port circles -->
  <circle cx="45" cy="-10" r="3.5" fill="#0e1420" stroke="#383858" stroke-width="0.8"/>
  <circle cx="45" cy="-10" r="1.4" fill="#090c14"/>
  <circle cx="45" cy="10"  r="3.5" fill="#0e1420" stroke="#383858" stroke-width="0.8"/>
  <circle cx="45" cy="10"  r="1.4" fill="#090c14"/>
</svg>
