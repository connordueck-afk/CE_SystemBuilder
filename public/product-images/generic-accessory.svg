<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -20 60 40">
  <defs>
    <linearGradient id="accbg" x1="0" y1="-20" x2="0" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#141020"/>
      <stop offset="100%" stop-color="#0e0c18"/>
    </linearGradient>
    <linearGradient id="pcbface" x1="0" y1="-16" x2="0" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0e1c18"/>
      <stop offset="100%" stop-color="#091410"/>
    </linearGradient>
  </defs>

  <!-- Outer enclosure -->
  <rect x="-28" y="-18" width="56" height="36" rx="4" fill="url(#accbg)"/>
  <rect x="-25" y="-17" width="50" height="3"  rx="1.5" fill="#1e1c30" opacity="0.5"/>

  <!-- PCB face -->
  <rect x="-24" y="-15" width="40" height="30" rx="3" fill="url(#pcbface)"/>
  <rect x="-24" y="-15" width="40" height="2"  rx="1" fill="#0a1c14" opacity="0.7"/>
  <rect x="-24" y="13"  width="40" height="2"  rx="1" fill="#0a1c14" opacity="0.7"/>

  <!-- IC chip -->
  <rect x="-8" y="-8" width="16" height="14" rx="2" fill="#141410"/>
  <rect x="-7" y="-7" width="14" height="12" rx="1.5" fill="#1a1a16"/>
  <!-- IC pins left -->
  <rect x="-11" y="-5"  width="3" height="1.5" rx="0.5" fill="#3a3820" opacity="0.8"/>
  <rect x="-11" y="-2"  width="3" height="1.5" rx="0.5" fill="#3a3820" opacity="0.8"/>
  <rect x="-11" y="1"   width="3" height="1.5" rx="0.5" fill="#3a3820" opacity="0.8"/>
  <!-- IC pins right -->
  <rect x="8"   y="-5"  width="3" height="1.5" rx="0.5" fill="#3a3820" opacity="0.8"/>
  <rect x="8"   y="-2"  width="3" height="1.5" rx="0.5" fill="#3a3820" opacity="0.8"/>
  <rect x="8"   y="1"   width="3" height="1.5" rx="0.5" fill="#3a3820" opacity="0.8"/>
  <circle cx="-5" cy="-5.5" r="0.8" fill="#3a8060" opacity="0.7"/>

  <!-- PCB traces -->
  <line x1="-24" y1="0" x2="-11" y2="0" stroke="#1a3020" stroke-width="0.8" opacity="0.6"/>
  <line x1="11"  y1="-4" x2="16"  y2="-4" stroke="#1a3020" stroke-width="0.8" opacity="0.6"/>
  <line x1="11"  y1="2"  x2="16"  y2="2"  stroke="#1a3020" stroke-width="0.8" opacity="0.6"/>

  <!-- Status LED -->
  <circle cx="18" cy="-11" r="2" fill="#20c050" opacity="0.8"/>
  <circle cx="18" cy="-11" r="3" fill="none" stroke="#20c050" stroke-width="0.5" opacity="0.3"/>

  <!-- Connector port on left edge at (-30, 0) -->
  <rect x="-30" y="-5" width="7" height="10" rx="2" fill="#181420"/>
  <rect x="-29" y="-4" width="5" height="8"  rx="1.5" fill="#201c2c"/>
  <rect x="-27" y="-3" width="1.2" height="2" rx="0.4" fill="#4a4858" opacity="0.9"/>
  <rect x="-25" y="-3" width="1.2" height="2" rx="0.4" fill="#4a4858" opacity="0.9"/>
  <rect x="-27" y="1"  width="1.2" height="2" rx="0.4" fill="#4a4858" opacity="0.9"/>
  <rect x="-25" y="1"  width="1.2" height="2" rx="0.4" fill="#4a4858" opacity="0.9"/>

  <!-- Terminal circle at signal port (-30, 0) -->
  <circle cx="-30" cy="0" r="3"   fill="#0e0c18" stroke="#302840" stroke-width="0.8"/>
  <circle cx="-30" cy="0" r="1.2" fill="#080610"/>

  <!-- Grey bar placeholder (replaces "MODULE" label) -->
  <rect x="-4" y="10" width="16" height="4" rx="1" fill="#3a4050"/>
</svg>
