<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -15 60 30">
  <defs>
    <linearGradient id="megabody" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5a1a1a"/>
      <stop offset="50%"  stop-color="#7a2020"/>
      <stop offset="100%" stop-color="#3d1010"/>
    </linearGradient>
    <linearGradient id="stud" x1="0" y1="-1" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#b0a090"/>
      <stop offset="50%"  stop-color="#d8c8b0"/>
      <stop offset="100%" stop-color="#7a6850"/>
    </linearGradient>
  </defs>

  <!-- Left bolt stud at (-30, 0) -->
  <polygon points="-30,-5.5 -26.5,-7 -23,-5.5 -23,5.5 -26.5,7 -30,5.5"
           fill="url(#stud)" stroke="#5a5040" stroke-width="0.5"/>
  <circle cx="-27" cy="0" r="3.5" fill="#4a4030" stroke="#7a6850" stroke-width="0.7"/>
  <circle cx="-27" cy="0" r="1.5" fill="#2a2018"/>
  <rect x="-23" y="-2.5" width="8" height="5" rx="1" fill="#9a8878"/>
  <circle cx="-30" cy="0" r="3" fill="#1a1408" stroke="#5a4828" stroke-width="0.8"/>

  <!-- Right bolt stud at (30, 0) -->
  <polygon points="30,-5.5 26.5,-7 23,-5.5 23,5.5 26.5,7 30,5.5"
           fill="url(#stud)" stroke="#5a5040" stroke-width="0.5"/>
  <circle cx="27" cy="0" r="3.5" fill="#4a4030" stroke="#7a6850" stroke-width="0.7"/>
  <circle cx="27" cy="0" r="1.5" fill="#2a2018"/>
  <rect x="15" y="-2.5" width="8" height="5" rx="1" fill="#9a8878"/>
  <circle cx="30" cy="0" r="3" fill="#1a1408" stroke="#5a4828" stroke-width="0.8"/>

  <!-- Fuse body -->
  <rect x="-14" y="-14" width="28" height="28" rx="4" fill="url(#megabody)"/>
  <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#8a2424"/>
  <rect x="-10" y="-10" width="20" height="9" rx="2" fill="#6a1a1a"/>
  <rect x="-7"  y="-7"  width="14" height="5" rx="1" fill="#3a0808" opacity="0.8"/>
  <line x1="-5" y1="-4.5" x2="5" y2="-4.5" stroke="#f87171" stroke-width="1" opacity="0.7"/>

  <!-- Top sheen -->
  <rect x="-10" y="-10" width="8" height="3" rx="1" fill="#ffffff" opacity="0.07"/>

  <!-- Label strip — grey bar placeholder -->
  <rect x="-9" y="4" width="18" height="7" rx="2" fill="#3d1010"/>
  <rect x="-7" y="5.5" width="14" height="4" rx="1" fill="#3a4050"/>
</svg>
