<svg xmlns="http://www.w3.org/2000/svg" viewBox="-48 -36 96 72">
  <!--
    Kisae SC Solar Charge Controller (MPPT) — no text.
    Product: width=96, height=72
    Terminals: PV+ (-48,-16), PV- (-48,16), Bat+ (48,-16), Bat- (48,16)
  -->
  <defs>
    <linearGradient id="kmp-shell" x1="0" y1="-36" x2="0" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#202430"/>
      <stop offset="100%" stop-color="#12141c"/>
    </linearGradient>
    <linearGradient id="kmp-face" x1="0" y1="-30" x2="0" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ededf2"/>
      <stop offset="100%" stop-color="#d2d5de"/>
    </linearGradient>
    <linearGradient id="kmp-orange" x1="-30" y1="0" x2="30" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#b85208"/>
      <stop offset="50%"  stop-color="#e07820"/>
      <stop offset="100%" stop-color="#b85208"/>
    </linearGradient>
  </defs>

  <!-- Outer shell -->
  <rect x="-46" y="-34" width="92" height="68" rx="5" fill="url(#kmp-shell)"/>

  <!-- Left terminal block (PV input) -->
  <rect x="-48" y="-24" width="13" height="48" rx="3" fill="#0a0c12"/>
  <circle cx="-41" cy="-16" r="3.6" fill="#060708" stroke="#20222a" stroke-width="0.9"/>
  <circle cx="-41" cy="-16" r="1.8" fill="#040506"/>
  <circle cx="-41" cy="16"  r="3.6" fill="#060708" stroke="#20222a" stroke-width="0.9"/>
  <circle cx="-41" cy="16"  r="1.8" fill="#040506"/>

  <!-- Right terminal block (Battery output) -->
  <rect x="35" y="-24" width="13" height="48" rx="3" fill="#0a0c12"/>
  <circle cx="41" cy="-16" r="3.6" fill="#7a1818" stroke="#1a1c24" stroke-width="0.9"/>
  <circle cx="41" cy="-16" r="1.8" fill="#0a0c12"/>
  <circle cx="41" cy="16"  r="3.6" fill="#1a1a1a" stroke="#3a3c44" stroke-width="0.9"/>
  <circle cx="41" cy="16"  r="1.8" fill="#0a0c12"/>

  <!-- Face plate -->
  <rect x="-32" y="-30" width="64" height="60" rx="4" fill="url(#kmp-face)"/>

  <!-- LCD display -->
  <rect x="-24" y="-24" width="48" height="20" rx="2" fill="#0a1810"/>
  <rect x="-20" y="-20" width="30" height="4" rx="1" fill="#1a8a3a" opacity="0.7"/>
  <rect x="-20" y="-13" width="20" height="3" rx="1" fill="#157030" opacity="0.6"/>

  <!-- Orange Kisae accent stripe -->
  <rect x="-32" y="0" width="64" height="6" rx="1.5" fill="url(#kmp-orange)"/>
  <rect x="-31" y="0" width="62" height="2" rx="1"   fill="#f0a040" opacity="0.3"/>

  <!-- Efficiency bar -->
  <rect x="-22" y="11" width="44" height="3" rx="1.5" fill="#1a2e20"/>
  <rect x="-22" y="11" width="38" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>

  <!-- Status LEDs -->
  <circle cx="-12" cy="22" r="2.2" fill="#22c55e"/>
  <circle cx="-4"  cy="22" r="2.2" fill="#3b82f6"/>
  <circle cx="4"   cy="22" r="2.2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="12"  cy="22" r="2.2" fill="#374151"/>
</svg>
