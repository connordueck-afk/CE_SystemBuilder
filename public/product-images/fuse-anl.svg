<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -15 60 30">
  <defs>
    <linearGradient id="lug" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8a7040"/>
      <stop offset="40%"  stop-color="#c8a050"/>
      <stop offset="100%" stop-color="#5a4820"/>
    </linearGradient>
    <linearGradient id="anlbody" x1="0" y1="-8" x2="0" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2a1e10"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
  </defs>

  <!-- Left copper lug plate at (-30, 0) -->
  <rect x="-30" y="-9"  width="18" height="18" rx="2" fill="url(#lug)"/>
  <rect x="-28" y="-7"  width="14" height="14" rx="1.5" fill="#d4a840" opacity="0.4"/>
  <circle cx="-22" cy="0" r="4" fill="#1a1208" stroke="#8a6828" stroke-width="0.8"/>
  <circle cx="-22" cy="0" r="1.8" fill="#0d0a04"/>
  <circle cx="-30" cy="0" r="3" fill="#1a1208" stroke="#7a6030" stroke-width="0.8"/>
  <rect x="-28" y="-8" width="6" height="3" rx="1" fill="#ffffff" opacity="0.07"/>

  <!-- Right copper lug plate at (30, 0) -->
  <rect x="12"  y="-9"  width="18" height="18" rx="2" fill="url(#lug)"/>
  <rect x="14"  y="-7"  width="14" height="14" rx="1.5" fill="#d4a840" opacity="0.4"/>
  <circle cx="22" cy="0" r="4" fill="#1a1208" stroke="#8a6828" stroke-width="0.8"/>
  <circle cx="22" cy="0" r="1.8" fill="#0d0a04"/>
  <circle cx="30" cy="0" r="3" fill="#1a1208" stroke="#7a6030" stroke-width="0.8"/>
  <rect x="22" y="-8" width="6" height="3" rx="1" fill="#ffffff" opacity="0.07"/>

  <!-- Central fuse body / housing -->
  <rect x="-11" y="-9" width="22" height="18" rx="2" fill="url(#anlbody)"/>
  <rect x="-9"  y="-7" width="18" height="14" rx="1.5" fill="#1e160a"/>
  <rect x="-6"  y="-5" width="12" height="10" rx="1" fill="#100c04"/>
  <!-- Fuse element blade -->
  <rect x="-4"  y="-1.5" width="8" height="3" rx="0.5" fill="#c8901e" opacity="0.8"/>
  <rect x="-4"  y="-1.5" width="4" height="1" rx="0.5" fill="#e8b840" opacity="0.5"/>

  <!-- Grey bar placeholder (replaces "ANL" label) -->
  <rect x="-8" y="9" width="16" height="4" rx="1" fill="#3a4050"/>
</svg>
