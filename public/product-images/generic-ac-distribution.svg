<svg xmlns="http://www.w3.org/2000/svg" viewBox="-55 -40 110 80">
  <defs>
    <linearGradient id="acpanelbg" x1="0" y1="-40" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#131820"/>
      <stop offset="100%" stop-color="#0d1016"/>
    </linearGradient>
    <linearGradient id="panelface" x1="0" y1="-35" x2="0" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#161e2c"/>
      <stop offset="100%" stop-color="#101420"/>
    </linearGradient>
  </defs>

  <!-- Outer enclosure -->
  <rect x="-53" y="-38" width="106" height="76" rx="5" fill="url(#acpanelbg)"/>
  <rect x="-49" y="-37" width="98"  height="4"  rx="2" fill="#1e2c44" opacity="0.5"/>

  <!-- AC Line conductor stubs -->
  <line x1="-55" y1="-12" x2="-32" y2="-12" stroke="#3a7ad0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32"  y1="-12" x2="55"  y2="-12" stroke="#3a7ad0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- AC Neutral conductor stubs -->
  <line x1="-55" y1="12"  x2="-32" y2="12"  stroke="#787878" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32"  y1="12"  x2="55"  y2="12"  stroke="#787878" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Central panel body -->
  <rect x="-32" y="-36" width="64" height="72" rx="4" fill="url(#panelface)"/>

  <!-- Panel top label strip — grey bar placeholder -->
  <rect x="-30" y="-35" width="60" height="9"  rx="2" fill="#1c2a40" opacity="0.9"/>
  <rect x="-22" y="-33" width="44" height="5" rx="1.5" fill="#3a4050"/>

  <!-- Internal bus bars -->
  <line x1="-30" y1="-12" x2="30" y2="-12" stroke="#3a7ad0" stroke-width="2" opacity="0.55"/>
  <line x1="-30" y1="12"  x2="30" y2="12"  stroke="#787878" stroke-width="2" opacity="0.55"/>

  <!-- 5 circuit breakers -->
  <rect x="-23" y="-25" width="6" height="12" rx="1.5" fill="#1e2c40"/>
  <rect x="-23" y="-24" width="6" height="5"  rx="1"   fill="#283a52"/>
  <rect x="-22" y="-23" width="2" height="4"  rx="0.5" fill="#3a7ad0"/>
  <rect x="-23" y="-12" width="6" height="24" rx="1.5" fill="#151e2c"/>
  <circle cx="-20" cy="22" r="1.8" fill="#20c050" opacity="0.8"/>

  <rect x="-13" y="-25" width="6" height="12" rx="1.5" fill="#1e2c40"/>
  <rect x="-13" y="-24" width="6" height="5"  rx="1"   fill="#283a52"/>
  <rect x="-12" y="-23" width="2" height="4"  rx="0.5" fill="#3a7ad0"/>
  <rect x="-13" y="-12" width="6" height="24" rx="1.5" fill="#151e2c"/>
  <circle cx="-10" cy="22" r="1.8" fill="#20c050" opacity="0.8"/>

  <rect x="-3"  y="-25" width="6" height="12" rx="1.5" fill="#1e2c40"/>
  <rect x="-3"  y="-24" width="6" height="5"  rx="1"   fill="#283a52"/>
  <rect x="-2"  y="-23" width="2" height="4"  rx="0.5" fill="#3a7ad0"/>
  <rect x="-3"  y="-12" width="6" height="24" rx="1.5" fill="#151e2c"/>
  <circle cx="0" cy="22" r="1.8" fill="#20c050" opacity="0.8"/>

  <rect x="7"   y="-25" width="6" height="12" rx="1.5" fill="#1e2c40"/>
  <rect x="7"   y="-24" width="6" height="5"  rx="1"   fill="#283a52"/>
  <rect x="8"   y="-23" width="2" height="4"  rx="0.5" fill="#3a7ad0"/>
  <rect x="7"   y="-12" width="6" height="24" rx="1.5" fill="#151e2c"/>
  <circle cx="10" cy="22" r="1.8" fill="#20c050" opacity="0.8"/>

  <rect x="17"  y="-25" width="6" height="12" rx="1.5" fill="#1e2c40"/>
  <rect x="17"  y="-24" width="6" height="5"  rx="1"   fill="#283a52"/>
  <rect x="18"  y="-23" width="2" height="4"  rx="0.5" fill="#3a7ad0"/>
  <rect x="17"  y="-12" width="6" height="24" rx="1.5" fill="#151e2c"/>
  <circle cx="20" cy="22" r="1.8" fill="#20c050" opacity="0.8"/>

  <!-- Terminal port circles -->
  <circle cx="-55" cy="-12" r="3.5" fill="#0e1420" stroke="#383858" stroke-width="0.8"/>
  <circle cx="-55" cy="-12" r="1.4" fill="#090c14"/>
  <circle cx="-55" cy="12"  r="3.5" fill="#0e1420" stroke="#383858" stroke-width="0.8"/>
  <circle cx="-55" cy="12"  r="1.4" fill="#090c14"/>
  <circle cx="55"  cy="-12" r="3.5" fill="#0e1420" stroke="#383858" stroke-width="0.8"/>
  <circle cx="55"  cy="-12" r="1.4" fill="#090c14"/>
  <circle cx="55"  cy="12"  r="3.5" fill="#0e1420" stroke="#383858" stroke-width="0.8"/>
  <circle cx="55"  cy="12"  r="1.4" fill="#090c14"/>
</svg>
