<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Victron Lynx Distributor simplified product asset">
  <defs>
    <linearGradient id="victronBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21a7df"/>
      <stop offset="55%" stop-color="#1194d0"/>
      <stop offset="100%" stop-color="#0a77b1"/>
    </linearGradient>
    <linearGradient id="victronBlueDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1598d2"/>
      <stop offset="100%" stop-color="#076fa6"/>
    </linearGradient>
    <linearGradient id="sideCap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2cb5ea"/>
      <stop offset="100%" stop-color="#0a79b2"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c2a"/>
      <stop offset="100%" stop-color="#e56200"/>
    </linearGradient>
    <linearGradient id="blackPort" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#464b53"/>
      <stop offset="100%" stop-color="#1a1e23"/>
    </linearGradient>
    <linearGradient id="redPort" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f24a42"/>
      <stop offset="100%" stop-color="#b51f1a"/>
    </linearGradient>
    <linearGradient id="screw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#808a93"/>
      <stop offset="100%" stop-color="#384049"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- left external terminals -->
    <rect x="86" y="144" width="150" height="164" rx="14" fill="url(#redPort)" stroke="#961a18" stroke-width="4"/>
    <circle cx="164" cy="226" r="28" fill="#db473d" opacity="0.42"/>
    <rect x="84" y="580" width="154" height="170" rx="14" fill="url(#blackPort)" stroke="#111418" stroke-width="4"/>
    <circle cx="162" cy="664" r="29" fill="#2c3138" opacity="0.85"/>

    <!-- main housing -->
    <rect x="224" y="78" width="1254" height="694" rx="38" fill="url(#victronBlue)" stroke="#0875ad" stroke-width="5"/>

    <!-- side caps -->
    <path d="M224 80 h132 q-38 42-38 124 v452 q0 80 38 116 h-132 q-52 0-52-52 v-588 q0-52 52-52z" fill="url(#sideCap)" stroke="#0878b0" stroke-width="4"/>
    <path d="M1346 80 h132 q52 0 52 52 v588 q0 52-52 52 h-132 q38-36 38-116 v-452 q0-82-38-124z" fill="url(#sideCap)" stroke="#0878b0" stroke-width="4"/>

    <!-- subtle top lip -->
    <path d="M304 80 h1092 l26 24 h-1144z" fill="#29afe5" opacity="0.72"/>
    <path d="M244 700 h1214" stroke="#0f7bb6" stroke-width="5" opacity="0.25"/>

    <!-- logo placeholder -->
    <g fill="#eef9fc" opacity="0.96">
      <path d="M414 300 q-18-22 0-42 q18-18 36 0 q18-18 36 0 q18 20 0 42 q-18 22-36 0 q-18 22-36 0z"/>
      <rect x="510" y="270" width="206" height="20" rx="10"/>
      <rect x="510" y="304" width="124" height="8" rx="4" opacity="0.85"/>
    </g>

    <!-- orange strip -->
    <rect x="412" y="398" width="948" height="36" rx="2" fill="url(#orange)"/>
    <path d="M418 404 h934" stroke="#ffb36a" stroke-opacity="0.35" stroke-width="4"/>

    <!-- arrows and guide line -->
    <polygon points="408,472 438,440 438,504" fill="#eaf7fb"/>
    <polygon points="1366,472 1336,440 1336,504" fill="#eaf7fb"/>
    <rect x="438" y="512" width="912" height="4" rx="2" fill="#e7f7fb" opacity="0.86"/>

    <!-- indicator dots -->
    <g>
      <circle cx="504" cy="472" r="18" fill="url(#screw)" stroke="#566069" stroke-width="4"/>
      <circle cx="662" cy="472" r="18" fill="url(#screw)" stroke="#566069" stroke-width="4"/>
      <circle cx="886" cy="472" r="18" fill="url(#screw)" stroke="#566069" stroke-width="4"/>
      <circle cx="1112" cy="472" r="18" fill="url(#screw)" stroke="#566069" stroke-width="4"/>
      <circle cx="1268" cy="472" r="18" fill="url(#screw)" stroke="#566069" stroke-width="4"/>
    </g>
    <rect x="914" y="462" width="78" height="16" rx="8" fill="#eef9fc" opacity="0.92"/>

    <!-- product title placeholders -->
    <g fill="#f2fbff" opacity="0.96">
      <rect x="440" y="534" width="358" height="36" rx="10"/>
      <rect x="820" y="536" width="152" height="30" rx="10" opacity="0.8"/>
      <rect x="440" y="590" width="156" height="68" rx="12"/>
      <rect x="440" y="684" width="908" height="5" rx="2"/>
      <rect x="1210" y="694" width="92" height="28" rx="8"/>
      <rect x="1314" y="698" width="44" height="18" rx="6" opacity="0.82"/>
    </g>

    <!-- front side screw holes -->
    <circle cx="308" cy="470" r="30" fill="#07669d" opacity="0.92"/>
    <circle cx="308" cy="470" r="17" fill="#13181d"/>
    <circle cx="1412" cy="470" r="30" fill="#07669d" opacity="0.92"/>
    <circle cx="1412" cy="470" r="17" fill="#13181d"/>

    <!-- bottom protrusions -->
    <path d="M488 722 h270 q28 0 42 22 q18 22 18 70 v24 q0 24-24 24 h-282 q-24 0-24-24 v-24 q0-48 18-70 q14-22 42-22z" fill="url(#victronBlueDark)"/>
    <path d="M966 722 h270 q28 0 42 22 q18 22 18 70 v24 q0 24-24 24 h-282 q-24 0-24-24 v-24 q0-48 18-70 q14-22 42-22z" fill="url(#victronBlueDark)"/>
    <rect x="844" y="722" width="92" height="92" rx="18" fill="#097db6" opacity="0.95"/>
    <rect x="860" y="812" width="60" height="42" rx="18" fill="#0d7bb2" opacity="0.95"/>

    <!-- subtle highlight lines -->
    <path d="M256 104 q30 20 30 98 v452 q0 76-30 96" stroke="#79d3f3" stroke-width="5" stroke-opacity="0.22" fill="none"/>
    <path d="M1438 104 q-30 20-30 98 v452 q0 76 30 96" stroke="#79d3f3" stroke-width="5" stroke-opacity="0.22" fill="none"/>
  </g>
</svg>
