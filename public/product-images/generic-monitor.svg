<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -30 80 60">
  <defs>
    <linearGradient id="monbody" x1="-40" y1="0" x2="40" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a2838"/>
      <stop offset="100%" stop-color="#1e3040"/>
    </linearGradient>
    <linearGradient id="shuntbar" x1="-40" y1="0" x2="40" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7a6030"/>
      <stop offset="50%"  stop-color="#c8a040"/>
      <stop offset="100%" stop-color="#7a6030"/>
    </linearGradient>
  </defs>

  <!-- Left shunt bolt at (-40, 0) -->
  <rect x="-40" y="-6" width="12" height="12" rx="2" fill="#1a2535"/>
  <rect x="-39" y="-5" width="10" height="10" rx="1.5" fill="#253545"/>
  <circle cx="-34" cy="0" r="4" fill="#1e3040" stroke="#4a6070" stroke-width="1"/>
  <circle cx="-34" cy="0" r="1.5" fill="#3a5060"/>

  <!-- Right shunt bolt at (40, 0) -->
  <rect x="28" y="-6" width="12" height="12" rx="2" fill="#1a2535"/>
  <rect x="29" y="-5" width="10" height="10" rx="1.5" fill="#253545"/>
  <circle cx="34" cy="0" r="4" fill="#1e3040" stroke="#4a6070" stroke-width="1"/>
  <circle cx="34" cy="0" r="1.5" fill="#3a5060"/>

  <!-- Shunt resistor bar -->
  <rect x="-26" y="-4" width="52" height="8" rx="2" fill="url(#shuntbar)"/>
  <rect x="-24" y="-3" width="48" height="2" rx="1" fill="#d4a840" opacity="0.4"/>

  <!-- Monitor unit body -->
  <rect x="-28" y="-29" width="56" height="24" rx="4" fill="url(#monbody)"/>
  <!-- Face panel -->
  <rect x="-26" y="-27" width="52" height="20" rx="3" fill="#0f1e2e"/>

  <!-- Display screen -->
  <rect x="-23" y="-25" width="46" height="16" rx="2" fill="#071220"/>

  <!-- Grey bar placeholders for readout values -->
  <rect x="-18" y="-22" width="18" height="4" rx="1" fill="#3a4050"/>
  <rect x="2"   y="-22" width="16" height="4" rx="1.5" fill="#3a4050"/>
  <line x1="-21" y1="-14" x2="21" y2="-14" stroke="#1a3040" stroke-width="0.5"/>
  <rect x="-18" y="-12" width="12" height="3" rx="1" fill="#3a4050" opacity="0.7"/>
  <rect x="0"   y="-12" width="10" height="3" rx="1" fill="#3a4050" opacity="0.7"/>

  <!-- Bluetooth LED -->
  <circle cx="20" cy="-22" r="2" fill="#3b82f6"/>

  <!-- Unit label strip — grey bar placeholder -->
  <rect x="-10" y="7" width="20" height="7" rx="1" fill="#0d1a28"/>
  <rect x="-7"  y="9" width="14" height="3" rx="1" fill="#3a4050"/>
</svg>
