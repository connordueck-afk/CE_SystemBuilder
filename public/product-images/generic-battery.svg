<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -50 80 100">
  <defs>
    <linearGradient id="case" x1="-40" y1="0" x2="40" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d2d3e"/>
      <stop offset="50%"  stop-color="#253347"/>
      <stop offset="100%" stop-color="#1a2838"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="-50" x2="0" y2="-34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a3d52"/>
      <stop offset="100%" stop-color="#1d2d3e"/>
    </linearGradient>
  </defs>

  <!-- Main battery case -->
  <rect x="-38" y="-30" width="76" height="76" rx="5" fill="url(#case)"/>
  <rect x="-37" y="-28" width="5" height="72" rx="2" fill="#2e4260" opacity="0.4"/>

  <!-- Top section (terminal area) -->
  <rect x="-38" y="-48" width="76" height="20" rx="5" fill="url(#top)"/>
  <rect x="-38" y="-34" width="76" height="6" fill="#1a2535"/>

  <!-- DC- terminal post at (-20, -50) -->
  <rect x="-24" y="-52" width="8" height="10" rx="2" fill="#2d3f54"/>
  <rect x="-23" y="-53" width="6" height="5" rx="1.5" fill="#1a2a3a"/>
  <circle cx="-20" cy="-50" r="3.5" fill="#111b28" stroke="#374f6a" stroke-width="0.8"/>

  <!-- DC+ terminal post at (20, -50) -->
  <rect x="16" y="-52" width="8" height="10" rx="2" fill="#2d3f54"/>
  <rect x="17" y="-53" width="6" height="5" rx="1.5" fill="#1a2a3a"/>
  <circle cx="20" cy="-50" r="3.5" fill="#111b28" stroke="#374f6a" stroke-width="0.8"/>

  <!-- BMS indicator light -->
  <circle cx="0" cy="-42" r="2" fill="#22c55e"/>

  <!-- Face panel area -->
  <rect x="-32" y="-22" width="64" height="64" rx="3" fill="#1e2e40" opacity="0.6"/>

  <!-- Cell representation — horizontal bars -->
  <rect x="-28" y="-14" width="56" height="10" rx="2" fill="#253545" stroke="#2e4260" stroke-width="0.5"/>
  <rect x="-28" y="-1"  width="56" height="10" rx="2" fill="#253545" stroke="#2e4260" stroke-width="0.5"/>
  <rect x="-28" y="12"  width="56" height="10" rx="2" fill="#253545" stroke="#2e4260" stroke-width="0.5"/>
  <rect x="-28" y="25"  width="56" height="10" rx="2" fill="#253545" stroke="#2e4260" stroke-width="0.5"/>

  <!-- Cell fill level -->
  <rect x="-27" y="-13" width="50" height="8" rx="1.5" fill="#1a3d6e" opacity="0.9"/>
  <rect x="-27" y="0"   width="50" height="8" rx="1.5" fill="#1a3d6e" opacity="0.9"/>
  <rect x="-27" y="13"  width="50" height="8" rx="1.5" fill="#1a3d6e" opacity="0.9"/>
  <rect x="-27" y="26"  width="50" height="8" rx="1.5" fill="#1a3d6e" opacity="0.9"/>

  <!-- Label strip — grey bar placeholder -->
  <rect x="-26" y="38" width="52" height="9" rx="2" fill="#152030"/>
  <rect x="-18" y="40.5" width="36" height="4" rx="1" fill="#3a4050"/>

  <!-- Bottom edge -->
  <rect x="-37" y="43" width="74" height="3" rx="1.5" fill="#111b28"/>
</svg>
