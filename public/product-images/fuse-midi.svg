<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -15 60 30">
  <defs>
    <linearGradient id="blade" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a89060"/>
      <stop offset="50%"  stop-color="#c8b078"/>
      <stop offset="100%" stop-color="#7a6840"/>
    </linearGradient>
    <linearGradient id="midibody" x1="0" y1="-15" x2="0" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9a7010"/>
      <stop offset="100%" stop-color="#6a4c0a"/>
    </linearGradient>
  </defs>

  <!-- Left blade terminal at (-30, 0) -->
  <rect x="-30" y="-4"   width="16" height="8" rx="1.5" fill="url(#blade)"/>
  <rect x="-29" y="-2.5" width="14" height="5" rx="1"   fill="#d0b880" opacity="0.5"/>
  <rect x="-20" y="-5.5" width="3" height="11" rx="0.5" fill="#5a4828" opacity="0.6"/>
  <circle cx="-30" cy="0" r="3.2" fill="#1a1408" stroke="#7a6030" stroke-width="0.8"/>
  <circle cx="-30" cy="0" r="1.2" fill="#3a2c18"/>

  <!-- Right blade terminal at (30, 0) -->
  <rect x="14"  y="-4"   width="16" height="8" rx="1.5" fill="url(#blade)"/>
  <rect x="15"  y="-2.5" width="14" height="5" rx="1"   fill="#d0b880" opacity="0.5"/>
  <rect x="17"  y="-5.5" width="3" height="11" rx="0.5" fill="#5a4828" opacity="0.6"/>
  <circle cx="30" cy="0" r="3.2" fill="#1a1408" stroke="#7a6030" stroke-width="0.8"/>
  <circle cx="30" cy="0" r="1.2" fill="#3a2c18"/>

  <!-- Fuse body — amber rectangular body -->
  <rect x="-14" y="-13" width="28" height="26" rx="4" fill="url(#midibody)"/>
  <rect x="-12" y="-11" width="24" height="22" rx="3" fill="#c89010" opacity="0.6"/>
  <rect x="-10" y="-9"  width="20" height="18" rx="2" fill="#e8b820" opacity="0.2"/>

  <!-- Fuse element zigzag wire -->
  <polyline points="-8,0 -6,-5 -3,5 0,-5 3,5 6,-5 8,0"
            fill="none" stroke="#f0c830" stroke-width="1.3" stroke-linejoin="round"
            stroke-linecap="round" opacity="0.85"/>

  <!-- Top sheen -->
  <rect x="-11" y="-11" width="10" height="4" rx="1.5" fill="#ffffff" opacity="0.08"/>

  <!-- Label strip — grey bar placeholder -->
  <rect x="-10" y="5" width="20" height="7" rx="1.5" fill="#5a3808" opacity="0.7"/>
  <rect x="-8"  y="6.5" width="16" height="4" rx="1" fill="#3a4050"/>
</svg>
