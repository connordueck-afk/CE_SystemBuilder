<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -40 120 80">
  <defs>
    <linearGradient id="body" x1="0" y1="-40" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2e3f54"/>
      <stop offset="100%" stop-color="#1a2535"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="-34" x2="0" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef1f6"/>
      <stop offset="100%" stop-color="#d8dfe8"/>
    </linearGradient>
  </defs>

  <!-- Main enclosure body -->
  <rect x="-58" y="-38" width="116" height="76" rx="6" fill="url(#body)"/>
  <rect x="-52" y="-37" width="104" height="3" rx="1.5" fill="#3d5270" opacity="0.6"/>

  <!-- Left terminal block — PV input -->
  <rect x="-60" y="-28" width="15" height="56" rx="3" fill="#111b28"/>
  <!-- PV+ port at (-60, -15) -->
  <rect x="-61" y="-19" width="9" height="8" rx="1.5" fill="#1e2d40"/>
  <circle cx="-57" cy="-15" r="3.2" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>
  <!-- PV- port at (-60, 15) -->
  <rect x="-61" y="11" width="9" height="8" rx="1.5" fill="#1e2d40"/>
  <circle cx="-57" cy="15" r="3.2" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Right terminal block — BAT output -->
  <rect x="45" y="-28" width="15" height="56" rx="3" fill="#111b28"/>
  <!-- BAT+ port at (60, -15) -->
  <rect x="52" y="-19" width="9" height="8" rx="1.5" fill="#1e2d40"/>
  <circle cx="57" cy="-15" r="3.2" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>
  <!-- BAT- port at (60, 15) -->
  <rect x="52" y="11" width="9" height="8" rx="1.5" fill="#1e2d40"/>
  <circle cx="57" cy="15" r="3.2" fill="#0d1824" stroke="#3a5070" stroke-width="0.8"/>

  <!-- Face plate -->
  <rect x="-43" y="-34" width="86" height="68" rx="4" fill="url(#face)"/>

  <!-- Display screen -->
  <rect x="-28" y="-28" width="56" height="36" rx="3" fill="#0b1520"/>
  <rect x="-27" y="-27" width="54" height="34" rx="2" fill="#0d1a28"/>

  <!-- Grey bar title placeholder -->
  <rect x="-20" y="-23" width="40" height="6" rx="2" fill="#3a4050"/>

  <!-- Power-flow arrow (no text labels) -->
  <line x1="-8" y1="-4" x2="5" y2="-4" stroke="#4a6070" stroke-width="1"/>
  <polygon points="5,-4 1,-7 1,-1" fill="#4a6070"/>

  <!-- Display: efficiency bar -->
  <rect x="-20" y="3" width="40" height="3" rx="1.5" fill="#1a2e20"/>
  <rect x="-20" y="3" width="36" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>

  <!-- LED row -->
  <circle cx="-10" cy="16" r="2.5" fill="#22c55e"/>
  <circle cx="-3"  cy="16" r="2.5" fill="#3b82f6"/>
  <circle cx="4"   cy="16" r="2.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="11"  cy="16" r="2.5" fill="#374151"/>

  <!-- Bottom label strip — grey bar placeholder -->
  <rect x="-28" y="22" width="56" height="8" rx="1.5" fill="#c8d4e0"/>
  <rect x="-20" y="24.5" width="40" height="4" rx="1" fill="#3a4050"/>

  <!-- Corner mounting holes -->
  <circle cx="-52" cy="-34" r="2" fill="#111b28"/>
  <circle cx="-52" cy="-34" r="1" fill="#0d1520"/>
  <circle cx="52"  cy="-34" r="2" fill="#111b28"/>
  <circle cx="52"  cy="-34" r="1" fill="#0d1520"/>
  <circle cx="-52" cy="34"  r="2" fill="#111b28"/>
  <circle cx="-52" cy="34"  r="1" fill="#0d1520"/>
  <circle cx="52"  cy="34"  r="2" fill="#111b28"/>
  <circle cx="52"  cy="34"  r="1" fill="#0d1520"/>
</svg>
