<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Victron Lithium Smart Battery simplified product asset">
  <defs>
    <linearGradient id="vicBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f9ae1"/>
      <stop offset="100%" stop-color="#2389d1"/>
    </linearGradient>
    <linearGradient id="vicBlue2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#41a7ea"/>
      <stop offset="100%" stop-color="#1f7fc7"/>
    </linearGradient>
    <linearGradient id="topLip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56b4ef"/>
      <stop offset="100%" stop-color="#2589cf"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#adb3ba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- main battery body -->
    <rect x="82" y="104" width="956" height="670" rx="8" fill="url(#vicBlue)" stroke="#1f7abf" stroke-width="4"/>

    <!-- top assembly -->
    <path d="M120 84 h880 l24 22 v58 h-928 v-58 z" fill="url(#vicBlue2)"/>
    <rect x="106" y="158" width="910" height="14" fill="url(#topLip)"/>
    <path d="M124 168 h894" stroke="#76c7f5" stroke-width="3" opacity="0.35"/>

    <!-- terminal studs -->
    <g>
      <rect x="230" y="54" width="16" height="34" rx="4" fill="url(#steel)" stroke="#7b8086" stroke-width="2"/>
      <circle cx="238" cy="54" r="16" fill="url(#steel)" stroke="#747980" stroke-width="3"/>
      <rect x="826" y="54" width="16" height="34" rx="4" fill="url(#steel)" stroke="#7b8086" stroke-width="2"/>
      <circle cx="834" cy="54" r="16" fill="url(#steel)" stroke="#747980" stroke-width="3"/>
    </g>

    <!-- subtle horizontal seam -->
    <path d="M82 296 h956" stroke="#167bc2" stroke-width="2" opacity="0.45"/>
    <path d="M82 748 h956" stroke="#1878bb" stroke-width="2" opacity="0.35"/>

    <!-- brand area placeholders -->
    <g fill="#d7f1fb" opacity="0.95">
      <path d="M286 250 q-16 -18 0 -34 q16 -16 30 0 q14 -16 30 0 q16 16 0 34 q-14 18 -30 0 q-14 18 -30 0z" opacity="0.92"/>
      <rect x="368" y="214" width="120" height="10" rx="5"/>
      <rect x="368" y="232" width="88" height="8" rx="4" opacity="0.9"/>
    </g>

    <!-- main product title placeholders (no readable text) -->
    <g fill="#eef8fd" opacity="0.98">
      <rect x="214" y="296" width="190" height="24" rx="8"/>
      <rect x="214" y="332" width="166" height="22" rx="7"/>
      <rect x="214" y="366" width="122" height="16" rx="6" opacity="0.95"/>
    </g>

    <!-- caution / details block -->
    <g fill="#dbf2fb" opacity="0.88">
      <rect x="214" y="414" width="90" height="8" rx="4"/>
      <rect x="214" y="432" width="136" height="7" rx="3.5"/>
      <rect x="214" y="446" width="120" height="7" rx="3.5"/>
      <rect x="214" y="460" width="146" height="7" rx="3.5"/>
      <rect x="214" y="474" width="128" height="7" rx="3.5"/>
      <rect x="214" y="488" width="112" height="7" rx="3.5"/>
    </g>

    <!-- icon / certification row -->
    <g stroke="#ecf8fd" stroke-width="4" fill="none" opacity="0.96">
      <circle cx="596" cy="556" r="15"/>
      <path d="M592 556 h8 M596 552 v8"/>
      <circle cx="648" cy="556" r="15"/>
      <circle cx="724" cy="556" r="15"/>
      <path d="M708 542 l32 28"/>
      <path d="M740 542 l-32 28"/>
      <circle cx="772" cy="556" r="15"/>
      <path d="M786 542 q14 14 0 28"/>
      <circle cx="820" cy="556" r="15"/>
      <path d="M806 542 l28 28"/>
      <path d="M834 542 l-28 28"/>
      <circle cx="868" cy="556" r="15"/>
      <path d="M860 548 l16 16 M876 548 l-16 16"/>
      <path d="M676 542 h22 v28 h-22 z"/>
    </g>

    <!-- misc small detail bars -->
    <g fill="#d6f0fb" opacity="0.9">
      <rect x="214" y="560" width="114" height="8" rx="4"/>
      <rect x="214" y="576" width="108" height="8" rx="4"/>
      <rect x="214" y="592" width="126" height="8" rx="4"/>
      <rect x="214" y="608" width="102" height="8" rx="4"/>
      <rect x="396" y="560" width="56" height="14" rx="4"/>
      <rect x="484" y="560" width="54" height="14" rx="4"/>
      <rect x="542" y="538" width="32" height="40" rx="2"/>
    </g>

    <!-- crossed wheeled-bin icon -->
    <g stroke="#eef8fd" stroke-width="5" fill="none" opacity="0.98">
      <path d="M804 394 h66 l-12 96 h-42 z"/>
      <path d="M824 378 h26"/>
      <path d="M836 378 v-14"/>
      <circle cx="824" cy="504" r="10"/>
      <circle cx="852" cy="504" r="10"/>
      <path d="M768 378 l118 150"/>
      <path d="M886 378 l-118 150"/>
    </g>

    <!-- lower edge / base -->
    <rect x="82" y="754" width="956" height="20" rx="3" fill="#1c7dc3"/>
  </g>
</svg>