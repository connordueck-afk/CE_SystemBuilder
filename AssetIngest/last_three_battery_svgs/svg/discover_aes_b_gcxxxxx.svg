<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-label="Discover AES-B-GC battery simplified product asset">
  <defs>
    <linearGradient id="bodyLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7e8ea"/>
      <stop offset="100%" stop-color="#d8d9db"/>
    </linearGradient>
    <linearGradient id="bodyShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f3f4"/>
      <stop offset="100%" stop-color="#d5d7d9"/>
    </linearGradient>
    <linearGradient id="lidBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f63ea"/>
      <stop offset="100%" stop-color="#5e8ce7"/>
    </linearGradient>
    <linearGradient id="lidBlue2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1475ff"/>
      <stop offset="100%" stop-color="#1758ca"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f9f9"/>
      <stop offset="100%" stop-color="#aeb4ba"/>
    </linearGradient>
    <linearGradient id="labelWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f2f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <clipPath id="batteryClip">
      <rect x="102" y="154" width="996" height="824" rx="6"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <!-- main body -->
    <rect x="102" y="154" width="996" height="824" rx="6" fill="url(#bodyLight)" stroke="#c3c6c9" stroke-width="3"/>

    <!-- top lid -->
    <path d="M138 110 h924 l24 20 v74 h-948 z" fill="url(#lidBlue)"/>
    <rect x="102" y="184" width="996" height="34" rx="4" fill="url(#lidBlue2)"/>
    <path d="M146 202 h938" stroke="#7ca9ff" stroke-width="4" opacity="0.28"/>

    <!-- terminal studs -->
    <g>
      <rect x="174" y="80" width="16" height="28" rx="4" fill="url(#steel)" stroke="#7b8085" stroke-width="2"/>
      <circle cx="182" cy="80" r="14" fill="url(#steel)" stroke="#767b81" stroke-width="3"/>
      <rect x="1009" y="80" width="16" height="28" rx="4" fill="url(#steel)" stroke="#7b8085" stroke-width="2"/>
      <circle cx="1017" cy="80" r="14" fill="url(#steel)" stroke="#767b81" stroke-width="3"/>
    </g>

    <!-- upper body seam -->
    <rect x="102" y="218" width="996" height="20" fill="#dfe1e3"/>
    <path d="M102 237 h996" stroke="#c5c8cb" stroke-width="3"/>

    <!-- molded emboss and diagonal features -->
    <g clip-path="url(#batteryClip)" opacity="0.44" stroke="#c4c7ca" stroke-width="4" fill="none">
      <!-- left small diagonal cluster -->
      <path d="M146 334 l46 -46"/>
      <path d="M146 370 l82 -82"/>
      <path d="M146 406 l118 -118"/>
      <path d="M146 442 l154 -154"/>
      <path d="M146 478 l190 -190"/>
      <path d="M146 514 l226 -226"/>
      <path d="M146 550 l262 -262"/>
      <path d="M146 586 l298 -298"/>
      <path d="M146 622 l334 -334"/>
      <path d="M146 658 l370 -370"/>
      <path d="M146 694 l406 -406"/>

      <!-- center upper diagonal block -->
      <path d="M464 314 l70 -70"/>
      <path d="M498 314 l104 -104"/>
      <path d="M532 314 l138 -138"/>
      <path d="M566 314 l172 -172"/>
      <path d="M600 314 l206 -206"/>
      <path d="M634 314 l206 -206"/>
      <path d="M668 314 l170 -170"/>
      <path d="M702 314 l134 -134"/>
      <path d="M736 314 l98 -98"/>

      <!-- right upper diagonal block -->
      <path d="M866 314 l68 -68"/>
      <path d="M898 314 l100 -100"/>
      <path d="M930 314 l132 -132"/>
      <path d="M962 314 l136 -136"/>

      <!-- lower center diagonal block -->
      <path d="M568 748 l90 -90"/>
      <path d="M602 748 l124 -124"/>
      <path d="M636 748 l158 -158"/>
      <path d="M670 748 l192 -192"/>
      <path d="M704 748 l226 -226"/>
      <path d="M738 748 l260 -260"/>
      <path d="M772 748 l294 -294"/>
      <path d="M806 748 l292 -292"/>
      <path d="M840 748 l258 -258"/>
      <path d="M874 748 l224 -224"/>
      <path d="M908 748 l190 -190"/>
      <path d="M942 748 l156 -156"/>
      <path d="M976 748 l122 -122"/>

      <!-- bottom feature lines -->
      <path d="M566 842 h418"/>
      <path d="M102 780 h996" opacity="0.2"/>
    </g>

    <!-- embossed title placeholders -->
    <g opacity="0.3" fill="#c0c3c6">
      <rect x="168" y="264" width="174" height="14" rx="7"/>
      <rect x="168" y="290" width="132" height="14" rx="7"/>
      <rect x="548" y="820" width="316" height="12" rx="6"/>
    </g>

    <!-- main label -->
    <rect x="470" y="388" width="564" height="254" rx="4" fill="url(#labelWhite)" stroke="#d6dade" stroke-width="2"/>

    <!-- large blue heading bars -->
    <g>
      <rect x="506" y="434" width="188" height="44" rx="4" fill="#2ba4f5"/>
      <rect x="702" y="434" width="84" height="26" rx="4" fill="#5f8fe5"/>
      <rect x="996" y="410" width="30" height="30" rx="3" fill="#4bb4ff"/>
      <path d="M1007 417 l8 8 l-8 8" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M1015 417 l8 8 l-8 8" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- subtle right swoosh area -->
    <path d="M798 426 q132 24 176 118 q-30 44 -18 98 h78 v-214 z" fill="#edf0f3"/>
    <path d="M836 426 q108 36 144 108" stroke="#d8dde1" stroke-width="4" fill="none"/>
    <path d="M824 452 q102 34 138 94" stroke="#dde2e6" stroke-width="3" fill="none"/>
    <path d="M814 478 q92 30 128 82" stroke="#e0e5e8" stroke-width="3" fill="none"/>
    <path d="M806 504 q82 28 112 72" stroke="#e4e8eb" stroke-width="3" fill="none"/>

    <!-- label placeholder bars instead of text -->
    <g fill="#a4acb4">
      <rect x="506" y="506" width="168" height="10" rx="5"/>
      <rect x="506" y="526" width="106" height="10" rx="5"/>
    </g>

    <!-- icon row placeholders -->
    <g stroke="#2a2d31" stroke-width="3" fill="none" opacity="0.82">
      <circle cx="544" cy="594" r="12"/>
      <path d="M544 582 v12 l8 6"/>
      <path d="M592 582 h14 l-4 12 l4 12 h-14 l4-12 z"/>
      <path d="M640 585 h12 l6 12 l-6 12 h-12 l-6-12 z"/>
      <path d="M690 582 q-10 14 0 26 q10-12 0-26z"/>
      <path d="M732 582 l0 26 M722 582 h20 M722 608 h20"/>
    </g>

    <!-- small icon captions as bars -->
    <g fill="#b7bdc4">
      <rect x="528" y="614" width="28" height="6" rx="3"/>
      <rect x="576" y="614" width="28" height="6" rx="3"/>
      <rect x="624" y="614" width="28" height="6" rx="3"/>
      <rect x="674" y="614" width="28" height="6" rx="3"/>
      <rect x="718" y="614" width="28" height="6" rx="3"/>
    </g>

    <!-- right rating / branding placeholders -->
    <g fill="#7f868f">
      <rect x="898" y="532" width="16" height="20" rx="4"/>
      <rect x="940" y="532" width="22" height="20" rx="4"/>
      <rect x="898" y="562" width="24" height="24" rx="4"/>
      <rect x="934" y="562" width="38" height="24" rx="4"/>
    </g>
    <rect x="862" y="596" width="126" height="16" rx="8" fill="#2b2d31"/>
    <rect x="862" y="620" width="96" height="10" rx="5" fill="#9ea6ae"/>

    <!-- bottom molded foot -->
    <path d="M174 920 h852 v44 h-34 l-18-16 h-112 l-18 16 h-120 l-18-16 h-112 l-18 16 h-120 l-18-16 h-112 l-18 16 h-114 l-18-16 h-56 z" fill="#e1e3e5" stroke="#c8cace" stroke-width="2"/>

    <!-- very soft floor reflection -->
    <g opacity="0.14">
      <rect x="280" y="984" width="640" height="30" rx="10" fill="#d9dcdf"/>
    </g>
  </g>
</svg>